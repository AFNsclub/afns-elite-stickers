<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player Dashboard | AFNS Elite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:linear-gradient(180deg,#010814,#021b33);color:white;text-align:center;}
.container{max-width:700px;margin:auto;padding:20px;}
h1,h2{margin:10px;}
canvas{background:#0c1b2a;border-radius:15px;padding:10px;}
.match-history{margin-top:20px;text-align:left;}
.match-card{background:#0f2545;padding:12px;border-radius:12px;margin-bottom:10px;box-shadow:0 0 12px rgba(0,0,0,.5);}
.win{border-left:5px solid #4cff8f;}
.loss{border-left:5px solid #ff6b6b;}
.draw{border-left:5px solid #ffd700;}
.small{font-size:12px;color:#aaa;margin-top:4px;}
</style>
</head>
<body>

<div class="container">
<h1 id="playerName">Loading...</h1>
<h2>Rating History</h2>
<canvas id="ratingChart" height="200"></canvas>

<div class="match-history">
<h2>Recent Matches</h2>
<div id="matchList"></div>
</div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});
const db=firebase.firestore();
const urlParams=new URLSearchParams(window.location.search);
const playerId=urlParams.get("id");

const playerName=document.getElementById("playerName");
const matchList=document.getElementById("matchList");

async function loadPlayerData(){
  const doc=await db.collection("players").doc(playerId).get();
  if(!doc.exists){playerName.innerText="Player Not Found";return;}
  const p=doc.data();
  playerName.innerText=p.username||"-";

  // Rating history
  const ratings=[]; const dates=[];
  const snaps=await db.collection("matches")
    .where("status","==","approved")
    .where("player1","==",p.username)
    .orderBy("createdAt").get();
  for(const d of snaps.docs){
    const m=d.data();
    ratings.push(m.ratingAfter1||1000);
    dates.push(m.createdAt?.toDate().toLocaleDateString()||"");
  }

  const ctx=document.getElementById("ratingChart").getContext("2d");
  new Chart(ctx,{type:"line",data:{labels:dates,datasets:[{
    label:"Rating",data:ratings,fill:false,borderColor:"#FFD700",tension:0.3,pointBackgroundColor:"#00ff99"
  }]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false}}}});
}

// Load matches
async function loadMatchHistory(){
  const doc=await db.collection("players").doc(playerId).get();
  if(!doc.exists) return;
  const username=doc.data().username;
  const snap1=await db.collection("matches").where("player1","==",username).where("status","==","approved").get();
  const snap2=await db.collection("matches").where("player2","==",username).where("status","==","approved").get();
  const allMatches=[...snap1.docs,...snap2.docs].sort((a,b)=>{
    const t1=a.data().createdAt?.toDate()?.getTime()||0;
    const t2=b.data().createdAt?.toDate()?.getTime()||0;
    return t2-t1;
  });
  matchList.innerHTML="";
  if(allMatches.length===0){matchList.innerHTML="<div>No matches yet</div>";return;}
  for(const m of allMatches){
    const opponent=m.data().player1===username?m.data().player2:m.data().player1;
    let cls="draw";
    if(m.data().resultType==="win"){cls=m.data().winner===username?"win":"loss";}
    matchList.innerHTML+=`<div class="match-card ${cls}">
      <b>${m.data().resultType.toUpperCase()}</b> vs ${opponent} <br>
      Score: ${m.data().score}<div class="small">${m.data().createdAt?.toDate().toLocaleString()||""}</div>
    </div>`;
  }
}

loadPlayerData(); loadMatchHistory();
</script>
</body>
</html>
