<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AFNS Player Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --gold:#FFD700;
  --silver:#C0C0C0;
  --bronze:#CD7F32;
  --bg-dark:#010814;
  --card:#0c1b2a;
  --text:#ffffff;
  --neon:#00f7ff;
}
body{margin:0;font-family:Segoe UI,sans-serif;background:linear-gradient(180deg,#010814,#021b33);color:var(--text);}
.container{max-width:900px;margin:auto;padding:20px;}
.card{background:var(--card);border-radius:20px;padding:20px;margin:15px 0;box-shadow:0 0 25px rgba(0,247,255,.2);}
h1,h2{text-align:center;margin:10px;}
h1{color:var(--gold);text-shadow:0 0 15px rgba(255,215,0,.6);}
.rating-box{font-size:2.5rem;font-weight:bold;padding:15px 30px;margin:15px auto;width:200px;background:#081a33;border-radius:15px;box-shadow:0 0 20px rgba(0,247,255,.3);transition:all 0.8s ease;text-align:center;}
.up{color:#00ff88;}
.down{color:#ff5555;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:10px;text-align:center;}
th{background:#061423;}
tr:nth-child(even){background:#081a33;}
.player-link{color:white;text-decoration:none;}
.player-link:hover{color:var(--gold);}
.chart-container{position:relative;width:100%;height:300px;margin-top:20px;}
</style>
</head>

<body>
<div class="container">
<h1 id="playerName">Loading...</h1>

<!-- Player Info -->
<div class="card">
<div>📧 Email: <span id="playerEmail">—</span></div>
<div>📱 Phone: <span id="playerPhone">—</span></div>
<div>💻 Device: <span id="playerDevice">—</span></div>
<div>🌐 Facebook: <span id="playerFB" style="color:var(--neon);cursor:pointer;text-decoration:underline;">—</span></div>
</div>

<!-- Rating Box -->
<div class="card">
<h2>🔥 Current Rating</h2>
<div class="rating-box" id="ratingBox">1000</div>
</div>

<!-- Rating History Graph -->
<div class="card">
<h2>📈 Rating History</h2>
<div class="chart-container"><canvas id="ratingChart"></canvas></div>
</div>

<!-- Recent Matches -->
<div class="card">
<h2>📜 Recent Matches</h2>
<table>
<thead>
<tr><th>Date</th><th>Opponent</th><th>Score</th><th>Result</th></tr>
</thead>
<tbody id="matchBody"><tr><td colspan="4">Loading...</td></tr></tbody>
</table>
</div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});

const db = firebase.firestore();
const ratingBox = document.getElementById("ratingBox");
const ratingChartCtx = document.getElementById("ratingChart").getContext("2d");
const matchBody = document.getElementById("matchBody");

function getQueryParam(param){const url=new URL(window.location.href);return url.searchParams.get(param);}

const playerId = getQueryParam("id");
if(!playerId){alert("Player ID missing");}

let currentRating = 1000;
let ratingChart = new Chart(ratingChartCtx,{
  type:'line',
  data:{labels:[],datasets:[{label:'Rating',data:[],borderColor:'#00f7ff',backgroundColor:'rgba(0,247,255,0.2)',tension:0.3,fill:true,pointRadius:3}]},
  options:{responsive:true,scales:{y:{beginAtZero:true}},plugins:{legend:{labels:{color:'#FFD700'}}}}
});

function updateRating(r){
  ratingBox.classList.remove("up","down");
  if(r>currentRating) ratingBox.classList.add("up");
  else if(r<currentRating) ratingBox.classList.add("down");
  let start = parseInt(ratingBox.innerText);
  let end = r;
  let duration = 1000;
  let startTime = null;
  function animate(timestamp){
    if(!startTime) startTime=timestamp;
    const progress=Math.min(1,(timestamp-startTime)/duration);
    ratingBox.innerText = Math.round(start + (end-start)*progress);
    if(progress<1) requestAnimationFrame(animate);
    else ratingBox.innerText=end;
  }
  requestAnimationFrame(animate);
  currentRating=r;
}

// Load Player Info & Rating
db.collection("players").doc(playerId).onSnapshot(doc=>{
  if(!doc.exists) return;
  const d = doc.data();
  document.getElementById("playerName").innerText=d.username||"-";
  document.getElementById("playerEmail").innerText=d.email||"-";
  document.getElementById("playerPhone").innerText=d.phone||"-";
  document.getElementById("playerDevice").innerText=d.deviceName||"-";
  const fb = d.facebook||"";
  const fbEl = document.getElementById("playerFB");
  fbEl.innerText = fb? "View Profile":"—";
  fbEl.onclick = ()=>{if(fb) window.open(fb,"_blank");};

  const r = d.rating || 1000;
  updateRating(r);

  // Load Rating History Graph
  db.collection("matches").where("status","==","approved")
    .where("player1Id","==",playerId).orderBy("createdAt")
    .onSnapshot(snap1=>{
      db.collection("matches").where("status","==","approved")
        .where("player2Id","==",playerId).orderBy("createdAt")
        .onSnapshot(snap2=>{
          const matches = [...snap1.docs,...snap2.docs].sort((a,b)=>{
            return (a.data().createdAt?.toDate()||0) - (b.data().createdAt?.toDate()||0);
          });
          const labels=[], data=[];
          let currentR=1000;
          matches.forEach(m=>{
            const match=m.data();
            const val = match.player1Id===playerId?match.ratingAfter1:match.ratingAfter2||currentR;
            currentR = val;
            labels.push(match.createdAt?.toDate().toLocaleDateString()||"-");
            data.push(currentR);
          });
          ratingChart.data.labels=labels;
          ratingChart.data.datasets[0].data=data;
          ratingChart.update();
        });
    });

  // Load Recent Matches
  db.collection("matches").where("status","==","approved")
    .where("player1Id","==",playerId).orderBy("createdAt","desc")
    .onSnapshot(snap1=>{
      db.collection("matches").where("status","==","approved")
        .where("player2Id","==",playerId).orderBy("createdAt","desc")
        .onSnapshot(snap2=>{
          const matches = [...snap1.docs,...snap2.docs].sort((a,b)=>{
            return (b.data().createdAt?.toDate()||0) - (a.data().createdAt?.toDate()||0);
          });
          matchBody.innerHTML="";
          if(matches.length===0){matchBody.innerHTML="<tr><td colspan='4'>No matches</td></tr>"; return;}
          matches.forEach(m=>{
            const match = m.data();
            const opponent = match.player1Id===playerId?match.player2:match.player1;
            const score = match.score||"-";
            let result = "Draw";
            if(match.winner){
              result = match.winner===d.username?"Win":"Loss";
            }
            matchBody.innerHTML += `<tr><td>${match.createdAt?.toDate().toLocaleDateString()||"-"}</td><td>${opponent||"-"}</td><td>${score}</td><td>${result}</td></tr>`;
          });
        });
    });
});
</script>
</body>
</html>
