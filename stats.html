<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Strikers | Leaderboard Fixed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* আগের স্টাইল হুবহু থাকবে */
:root{ --gold:#FFD700; --silver:#C0C0C0; --bronze:#CD7F32; --neon:#00f7ff; --bg-dark:#010814; --text:#ffffff; }
body{ margin:0; font-family:Segoe UI,sans-serif; background:linear-gradient(180deg,var(--bg-dark),#021b33); color:var(--text); display:flex; flex-direction:column; align-items:center; padding:20px; }
.container{ max-width:1000px; width:100%; background:rgba(0,0,0,.65); border-radius:20px; padding:25px 30px; backdrop-filter:blur(12px); margin-bottom:30px; box-shadow:0 0 40px rgba(0,247,255,.3); overflow-x: auto;}
h1{color:var(--gold); text-align:center;} h2{color:var(--neon); text-align:center;}
table{width:100%; border-collapse:collapse; margin-top:15px; min-width: 600px;}
th,td{ padding:12px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); }
.rank1{background:var(--gold); color:#000; font-weight: bold;} 
.rank2{background:var(--silver); color:#000; font-weight: bold;} 
.rank3{background:var(--bronze); color:#000; font-weight: bold;}
button{ padding:10px 20px; border:none; border-radius:10px; cursor:pointer; font-weight:700; background:linear-gradient(90deg,var(--neon),#008cff); color:#000; margin:5px;}
.p-img{width: 30px; height: 30px; border-radius: 50%; vertical-align: middle; margin-right: 8px;}
</style>
</head>
<body>

<h1>🏆 AFNS Elite Strikers</h1>

<div class="container">
  <h2 id="seasonTitle">Season Ranking</h2>
  <div style="text-align:center;"><button id="toggleBtn">Switch to All Time</button></div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>W</th>
        <th>L</th>
        <th>D</th>
        <th>Total</th>
        <th>Rating</th>
      </tr>
    </thead>
    <tbody id="rankingBody">
      <tr><td colspan="7">Loading Player Stats...</td></tr>
    </tbody>
  </table>
</div>

<div class="container">
  <h2>Player Rating Graph</h2>
  <canvas id="ratingChart"></canvas>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});
const db=firebase.firestore();

let mode="season";
let cachedDocs=[];
let ratingChart=null;

// রিয়েলটাইম লিডারবোর্ড লিসেনার
// (পুরাতন ম্যাচ বা প্লেয়ার না আসার কারণ হতে পারে orderBy লজিক, তাই আমরা এটি সব প্লেয়ারের জন্য সেট করছি)
db.collection("players").onSnapshot(snapshot=>{
  cachedDocs=snapshot.docs;
  reloadLeaderboard();
});

function reloadLeaderboard(){
  const rankingBody=document.getElementById("rankingBody");
  rankingBody.innerHTML="";

  // সর্টিং লজিক (রেটিং অনুযায়ী সাজানো)
  let sortedData = [...cachedDocs].sort((a, b) => {
      let rA = mode === "season" ? (a.data().ratingSeason || 1000) : (a.data().ratingAllTime || 1000);
      let rB = mode === "season" ? (b.data().ratingSeason || 1000) : (b.data().ratingAllTime || 1000);
      return rB - rA;
  });

  let rank=1;
  sortedData.forEach(doc=>{
    const p=doc.data();
    const rating = mode==="season" ? p.ratingSeason||1000 : p.ratingAllTime||1000;
    
    // ডাটাবেজ থেকে Wins/Losses/Draws নেওয়া
    const w = p.wins || 0;
    const l = p.losses || 0;
    const d = p.draws || 0;
    const total = (p.matchesPlayed) ? p.matchesPlayed : (w + l + d);

    const cls = rank===1?"rank1":rank===2?"rank2":rank===3?"rank3":"";

    rankingBody.innerHTML+=`
      <tr class="${cls}">
        <td>${rank}</td>
        <td style="text-align:left;">${p.username || doc.id}</td>
        <td style="color:#4cff8f">${w}</td>
        <td style="color:#ff6b6b">${l}</td>
        <td style="color:#ffd700">${d}</td>
        <td>${total}</td>
        <td style="font-weight:bold; color:var(--neon)">${rating}</td>
      </tr>`;
    rank++;
  });
  loadGraph(sortedData);
}

function loadGraph(data){
  const labels = data.map(d=>d.data().username || d.id);
  const ratings = data.map(d=> mode==="season" ? d.data().ratingSeason||1000 : d.data().ratingAllTime||1000);
  const ctx=document.getElementById("ratingChart").getContext("2d");
  if(ratingChart) ratingChart.destroy();
  ratingChart = new Chart(ctx,{
    type:"bar",
    data:{ labels:labels, datasets:[{ label:"Rating Points", data:ratings, backgroundColor: '#00f7ff' }] },
    options:{ responsive: true, scales:{ y:{beginAtZero:false} } }
  });
}

// মোড টগল লজিক
document.getElementById("toggleBtn").onclick=()=>{
  mode = mode==="season" ? "alltime":"season";
  document.getElementById("toggleBtn").innerText = mode==="season" ? "Switch to All Time":"Switch to Season";
  document.getElementById("seasonTitle").innerText = mode==="season" ? "Season Ranking":"All Time Ranking";
  reloadLeaderboard();
};
</script>
</body>
</html>
