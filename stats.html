<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Strikers | Realtime Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --gold:#FFD700;
  --silver:#C0C0C0;
  --bronze:#CD7F32;
  --neon:#00f7ff;
  --bg-dark:#010814;
  --card:rgba(0,0,0,.65);
  --text:#ffffff;
}
body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:linear-gradient(180deg,var(--bg-dark),#021b33);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:20px;
}
h1,h2{text-align:center;margin:10px 0;}
h1{color:var(--gold);}
h2{color:var(--neon);margin-top:30px;}

.container{
  max-width:900px;
  width:100%;
  background:var(--card);
  border-radius:20px;
  padding:25px 30px;
  backdrop-filter:blur(12px);
  margin-bottom:30px;
  box-shadow:0 0 40px rgba(0,247,255,.3);
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:10px;
  font-weight:700;
  background:linear-gradient(90deg,var(--neon),#008cff);
  color:#000;
}

table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.1);
}
th{background:rgba(0,0,0,.3);}
tr:hover{background:rgba(0,0,0,.4);}

.rank1{background:var(--gold); color:#000;}
.rank2{background:var(--silver); color:#000;}
.rank3{background:var(--bronze); color:#000;}

.player-link{color:var(--neon); text-decoration:none;}
.player-link:hover{color:var(--gold);}

.chart-container{
  position:relative;
  width:100%;
  max-width:800px;
  margin-top:20px;
}

.autocomplete-wrapper{position:relative;flex:1;}
.autocomplete-suggestions{
  position:absolute;
  background:#0c1b2a;
  max-height:150px;
  overflow-y:auto;
  border-radius:5px;
  z-index:10;
}
.autocomplete-suggestions div{
  padding:6px 10px;
  cursor:pointer;
}
.autocomplete-suggestions div:hover{
  background:rgba(0,247,255,.3);
}
</style>
</head>
<body>

<h1>🏆 AFNS Elite Strikers</h1>

<div class="container">
  <h2 id="seasonTitle">Season Ranking</h2>
  <button id="toggleBtn">Switch to All Time</button>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Wins</th>
        <th>Losses</th>
        <th>Draws</th>
        <th>Rating</th>
      </tr>
    </thead>
    <tbody id="rankingBody">
      <tr><td colspan="6">Loading...</td></tr>
    </tbody>
  </table>
</div>

<div class="container">
  <h2>Player Rating Graph</h2>
  <div class="chart-container">
    <canvas id="ratingChart"></canvas>
  </div>
</div>

<div class="container">
  <h2>Head-to-Head Comparison</h2>

  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <div class="autocomplete-wrapper">
      <input type="text" id="playerA" placeholder="Player A" autocomplete="off"/>
      <div class="autocomplete-suggestions" id="suggestionsA"></div>
    </div>

    <div class="autocomplete-wrapper">
      <input type="text" id="playerB" placeholder="Player B" autocomplete="off"/>
      <div class="autocomplete-suggestions" id="suggestionsB"></div>
    </div>

    <button onclick="loadH2H()">Compare</button>
  </div>

  <table style="margin-top:15px;">
    <thead>
      <tr>
        <th>#</th>
        <th>Player 1</th>
        <th>Player 2</th>
        <th>Score</th>
        <th>Winner</th>
      </tr>
    </thead>
    <tbody id="h2hBody">
      <tr><td colspan="5">Enter players to compare</td></tr>
    </tbody>
  </table>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});

const db=firebase.firestore();

let mode="season";
let cachedDocs=[];
let ratingChart=null;
let playerList=[];

const rankingBody=document.getElementById("rankingBody");
const toggleBtn=document.getElementById("toggleBtn");
const seasonTitle=document.getElementById("seasonTitle");

db.collection("players").get().then(snap=>{
  snap.forEach(doc=>playerList.push(doc.data().username));
});

db.collection("players")
.orderBy("ratingAllTime","desc")
.onSnapshot(snapshot=>{
  cachedDocs=snapshot.docs;
  reloadLeaderboard();
});

toggleBtn.onclick=()=>{
  mode = mode==="season" ? "alltime":"season";
  toggleBtn.innerText =
    mode==="season" ? "Switch to All Time":"Switch to Season";
  seasonTitle.innerText =
    mode==="season" ? "Season Ranking":"All Time Ranking";
  reloadLeaderboard();
};

function reloadLeaderboard(){
  rankingBody.innerHTML="";
  if(!cachedDocs.length){
    rankingBody.innerHTML="<tr><td colspan='6'>No players found</td></tr>";
    return;
  }

  let rank=1;

  cachedDocs.forEach(doc=>{
    const p=doc.data();
    const rating =
      mode==="season" ? p.ratingSeason||1000 : p.ratingAllTime||1000;

    const cls =
      rank===1?"rank1":
      rank===2?"rank2":
      rank===3?"rank3":"";

    rankingBody.innerHTML+=`
      <tr class="${cls}">
        <td>${rank}</td>
        <td>
          <a class="player-link"
             href="public-profile.html?id=${doc.id}">
             ${p.username}
          </a>
        </td>
        <td>${p.wins||0}</td>
        <td>${p.losses||0}</td>
        <td>${p.draws||0}</td>
        <td>${rating}</td>
      </tr>
    `;
    rank++;
  });

  loadGraph();
}

function loadGraph(){
  const labels=[];
  const ratings=[];

  cachedDocs.forEach(doc=>{
    labels.push(doc.data().username);
    ratings.push(
      mode==="season"
        ? doc.data().ratingSeason||1000
        : doc.data().ratingAllTime||1000
    );
  });

  const ctx=document.getElementById("ratingChart").getContext("2d");
  if(ratingChart) ratingChart.destroy();

  ratingChart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Rating",
        data:ratings
      }]
    },
    options:{
      responsive:true,
      animation:{duration:1000}
    }
  });
}

function loadH2H(){
  const a=document.getElementById("playerA").value.toLowerCase();
  const b=document.getElementById("playerB").value.toLowerCase();
  const tbody=document.getElementById("h2hBody");

  if(!a||!b){
    alert("Enter both players");
    return;
  }

  db.collection("matches")
  .where("status","==","approved")
  .get()
  .then(snapshot=>{
    tbody.innerHTML="";
    let count=1;

    snapshot.forEach(doc=>{
      const m=doc.data();
      if(
        (m.player1.toLowerCase().includes(a)
        && m.player2.toLowerCase().includes(b))
        ||
        (m.player2.toLowerCase().includes(a)
        && m.player1.toLowerCase().includes(b))
      ){
        tbody.innerHTML+=`
          <tr>
            <td>${count}</td>
            <td>${m.player1}</td>
            <td>${m.player2}</td>
            <td>${m.score}</td>
            <td>${m.winner||"Draw"}</td>
          </tr>
        `;
        count++;
      }
    });

    if(count===1){
      tbody.innerHTML="<tr><td colspan='5'>No matches found</td></tr>";
    }
  });
}

function setupAutocomplete(inputId,boxId){
  const input=document.getElementById(inputId);
  const box=document.getElementById(boxId);

  input.addEventListener("input",()=>{
    const val=input.value.toLowerCase();
    box.innerHTML="";
    if(!val){box.style.display="none";return;}

    const matches=playerList
      .filter(p=>p.toLowerCase().startsWith(val))
      .slice(0,5);

    matches.forEach(p=>{
      const div=document.createElement("div");
      div.textContent=p;
      div.onclick=()=>{
        input.value=p;
        box.style.display="none";
      };
      box.appendChild(div);
    });

    box.style.display=matches.length?"block":"none";
  });

  input.addEventListener("blur",()=>{
    setTimeout(()=>box.style.display="none",100);
  });
}

setupAutocomplete("playerA","suggestionsA");
setupAutocomplete("playerB","suggestionsB");
</script>

</body>
  </html>
