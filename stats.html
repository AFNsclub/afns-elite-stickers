<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Strikers | Leaderboard & Player Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase 9 Compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Chart.js for Graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --gold:#FFD700;
  --silver:#C0C0C0;
  --bronze:#CD7F32;
  --neon:#00f7ff;
  --bg-dark:#010814;
  --card:rgba(0,0,0,.65);
  --text:#ffffff;
}

body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:linear-gradient(180deg,var(--bg-dark),#021b33);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

h1,h2{
  text-align:center;
  margin:10px 0;
}
h1{color:var(--gold);}
h2{color:var(--neon); margin-top:30px;}

.container{
  max-width:900px;
  width:100%;
  background:var(--card);
  border-radius:20px;
  padding:25px 30px;
  backdrop-filter:blur(12px);
  margin-bottom:30px;
  box-shadow:0 0 40px rgba(0,247,255,.3),0 0 20px rgba(255,215,0,.25);
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:10px;
  font-weight:700;
  background:linear-gradient(90deg,var(--neon),#008cff);
  color:#000;
  transition:.3s;
}
button:hover{
  background:linear-gradient(90deg,#008cff,var(--neon));
  color:#fff;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.1);
}
th{background:rgba(0,0,0,.3);}
tr:hover{background:rgba(0,0,0,.4);}
.rank1{background:var(--gold); color:#000;}
.rank2{background:var(--silver); color:#000;}
.rank3{background:var(--bronze); color:#000;}
.player-link{color:var(--neon); text-decoration:none;}
.player-link:hover{color:var(--gold);}

/* Chart Container */
.chart-container{
  position:relative;
  width:100%;
  max-width:800px;
  margin-top:20px;
}

/* H2H Table */
.h2h-table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}
.h2h-table th, .h2h-table td{
  padding:10px;
  border:1px solid rgba(255,255,255,.2);
  text-align:center;
}
</style>
</head>

<body>

<h1>🏆 AFNS Elite Strikers</h1>

<div class="container">
  <h2 id="seasonTitle">Season Ranking</h2>
  <button id="toggleBtn">Switch to All Time</button>
  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Wins</th>
        <th>Losses</th>
        <th>Draws</th>
        <th>Rating</th>
      </tr>
    </thead>
    <tbody id="rankingBody">
      <tr><td colspan="6">Loading...</td></tr>
    </tbody>
  </table>
</div>

<div class="container">
  <h2>Player Rating Graph</h2>
  <div class="chart-container">
    <canvas id="ratingChart"></canvas>
  </div>
</div>

<div class="container">
  <h2>Head-to-Head Comparison</h2>
  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
    <input type="text" id="playerA" placeholder="Player A" />
    <input type="text" id="playerB" placeholder="Player B" />
    <button onclick="loadH2H()">Compare</button>
  </div>
  <table class="h2h-table" id="h2hTable">
    <thead>
      <tr>
        <th>Match</th>
        <th>Player A</th>
        <th>Player B</th>
        <th>Score</th>
        <th>Winner</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="5">Enter players to see H2H matches</td></tr>
    </tbody>
  </table>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});

const db = firebase.firestore();

const rankingBody = document.getElementById("rankingBody");
const toggleBtn = document.getElementById("toggleBtn");
const seasonTitle = document.getElementById("seasonTitle");
let mode = "season";

// --- Leaderboard ---
function getSeasonIndex(month){
  if(month>=8) return 3;
  if(month>=4) return 2;
  return 1;
}
function getCurrentSeasonId(){
  const now = new Date();
  return now.getFullYear()+"-S"+getSeasonIndex(now.getMonth());
}
function seasonName(seasonId){
  const parts = seasonId.split("-");
  const year = parts[0];
  const s = parts[1];
  if(s==="S1") return year+" Season 1 (Jan-Apr)";
  if(s==="S2") return year+" Season 2 (May-Aug)";
  return year+" Season 3 (Sep-Dec)";
}

function loadRanking(){
  rankingBody.innerHTML="<tr><td colspan='6'>Loading...</td></tr>";
  let query = db.collection("players");
  if(mode==="season"){
    const seasonId = getCurrentSeasonId();
    seasonTitle.innerText = "Season Ranking: "+seasonName(seasonId);
    query = query.orderBy("ratingSeason","desc");
  } else {
    seasonTitle.innerText = "All Time Leaderboard";
    query = query.orderBy("ratingAllTime","desc");
  }
  query.get().then(snapshot=>{
    rankingBody.innerHTML="";
    if(snapshot.empty){
      rankingBody.innerHTML="<tr><td colspan='6'>No players found</td></tr>";
      return;
    }
    let rank = 1;
    snapshot.forEach(doc=>{
      const p = doc.data();
      const className = rank===1?"rank1":rank===2?"rank2":rank===3?"rank3":"";
      const rating = mode==="season"?p.ratingSeason||0:p.ratingAllTime||0;
      rankingBody.innerHTML += `
        <tr class="${className}">
          <td>${rank}</td>
          <td><a class="player-link" href="public-profile.html?id=${doc.id}">${p.username||"-"}</a></td>
          <td>${p.wins||0}</td>
          <td>${p.losses||0}</td>
          <td>${p.draws||0}</td>
          <td>${rating}</td>
        </tr>
      `;
      rank++;
    });
  });
}

toggleBtn.onclick = ()=>{
  mode = mode==="season"?"alltime":"season";
  toggleBtn.innerText = mode==="season"?"Switch to All Time":"Switch to Season";
  loadRanking();
}
loadRanking();

// --- Rating Graph ---
let ratingChart = null;
function loadRatingGraph(){
  db.collection("players").get().then(snapshot=>{
    const labels = [];
    const ratings = [];
    snapshot.forEach(doc=>{
      labels.push(doc.data().username||"-");
      ratings.push(doc.data().rating||1000);
    });
    if(ratingChart) ratingChart.destroy();
    const ctx = document.getElementById("ratingChart").getContext("2d");
    ratingChart = new Chart(ctx,{
      type:"bar",
      data:{
        labels:labels,
        datasets:[{
          label:"Rating",
          data:ratings,
          backgroundColor:"rgba(0,247,255,0.7)",
          borderColor:"rgba(0,247,255,1)",
          borderWidth:1
        }]
      },
      options:{
        responsive:true,
        animation:{duration:1000,easing:"easeOutBounce"},
        scales:{y:{beginAtZero:true}}
      }
    });
  });
}
loadRatingGraph();

// --- Head-to-Head ---
function loadH2H(){
  const a = document.getElementById("playerA").value.trim();
  const b = document.getElementById("playerB").value.trim();
  if(!a||!b){
    alert("Enter both players!");
    return;
  }
  db.collection("matches")
    .where("status","==","approved")
    .get().then(snapshot=>{
      const tbody = document.querySelector("#h2hTable tbody");
      tbody.innerHTML="";
      let count=1;
      snapshot.forEach(doc=>{
        const m = doc.data();
        if((m.player1===a && m.player2===b)||(m.player1===b && m.player2===a)){
          tbody.innerHTML += `
            <tr>
              <td>${count}</td>
              <td>${m.player1}</td>
              <td>${m.player2}</td>
              <td>${m.score}</td>
              <td>${m.winner||"Draw"}</td>
            </tr>`;
          count++;
        }
      });
      if(count===1){
        tbody.innerHTML="<tr><td colspan='5'>No matches found between these players</td></tr>";
      }
    });
}
</script>

</body>
</html>
