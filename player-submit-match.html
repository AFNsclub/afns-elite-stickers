<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Match | AFNS Elite Strikers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{ --neon:#00f7ff; --gold:#ffd700; --bg-dark:#050a12; }
body{ margin:0; min-height:100vh; padding:20px; display:flex; flex-direction:column; align-items:center; background: radial-gradient(circle at top right, rgba(0,247,255,0.1), transparent), var(--bg-dark); font-family: 'Segoe UI', sans-serif; color:white; }
.container{ width:100%; max-width:650px; background: rgba(13, 25, 41, 0.85); border-radius:24px; padding:30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
h2{text-align:center; color:var(--gold); text-transform: uppercase; letter-spacing: 2px;}
.section-title{ color: var(--neon); font-size: 14px; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; border-bottom: 1px solid rgba(0,247,255,0.2); padding-bottom: 5px;}
label{display:block; margin-top:12px; font-size: 12px; font-weight: 600; color: #aaa;}
input, select, button{ width:100%; padding:12px; margin-top:6px; border-radius:10px; border:none; box-sizing: border-box; outline:none;}
input, select{ background: rgba(0,0,0,0.3); color:#fff; border: 1px solid rgba(0,247,255,0.2); }
.squad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.searchBox{ position:relative; }

/* DROPDOWN STYLING FIX */
.dropdown{ 
    position:absolute; 
    width:100%; 
    background:#0d1929; 
    max-height:160px; 
    overflow-y:auto; 
    border-radius:8px; 
    z-index:999; 
    border:1px solid var(--neon); 
    display:none;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}
.dropdown div{ padding:10px; cursor:pointer; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff;}
.dropdown div:hover{ background: var(--neon); color:#000;}

button{ background: linear-gradient(135deg, var(--neon), #008cff); color:#000; font-weight:800; cursor:pointer; margin-top:30px; text-transform: uppercase;}
</style>
</head>
<body>

<div class="container">
  <h2 id="matchTitle">Match Center</h2>

  <label>Match Mode</label>
  <select id="matchType" onchange="toggleMatchUI()">
    <option value="Friendly">Friendly Match (1v1)</option>
    <option value="Tournament">Squad War (Team)</option>
  </select>

  <div id="teamInfo" style="display:none;">
    <div class="squad-grid">
      <div><label>Home Team</label><input type="text" id="hTeam" placeholder="e.g. ARGENTINA PES"></div>
      <div><label>Away Team</label><input type="text" id="aTeam" placeholder="e.g. BRAZIL STARS"></div>
    </div>
  </div>

  <div id="squadArea">
    <div id="singleFields">
      <div class="squad-grid">
        <div>
            <label>Home Player</label>
            <div class="searchBox">
                <input type="text" class="p-search" placeholder="Search Player...">
                <div class="dropdown"></div>
            </div>
        </div>
        <div>
            <label>Away Player</label>
            <div class="searchBox">
                <input type="text" class="p-search" placeholder="Search Player...">
                <div class="dropdown"></div>
            </div>
        </div>
      </div>
    </div>

    <div id="teamFields" style="display:none;">
      <div class="squad-grid">
        <div id="homeSquadList"><div class="section-title">Home Squad</div></div>
        <div id="awaySquadList"><div class="section-title">Away Squad</div></div>
      </div>
    </div>
  </div>

  <div class="section-title">Match Result</div>
  <label>Final Score (e.g. 2 - 1)</label>
  <input type="text" id="score" placeholder="X - X">

  <button id="subBtn" onclick="submitReport()">Submit Match</button>
  <div id="message" style="text-align:center; margin-top:15px;"></div>
</div>

<script>
// Firebase Initialization
firebase.initializeApp({ 
    apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM", 
    authDomain:"afnsclub.firebaseapp.com", 
    projectId:"afnsclub" 
});
const db = firebase.firestore();

let allPlayers = []; 
let adminTName = "Friendly"; 
let adminPCount = 1;

// ১. সেটিংস এবং প্লেয়ার ডাটা লোড করা
async function loadData() {
  const settings = await db.collection("settings").doc("tournament").get();
  if(settings.exists) {
    adminTName = settings.data().currentTournament;
    adminPCount = settings.data().playerCount;
  }

  // প্লেয়ার লিস্ট লোড (সার্চের জন্য)
  const snap = await db.collection("players").get();
  allPlayers = [];
  snap.forEach(doc => {
    const p = doc.data();
    if(p.username) allPlayers.push(p.username);
  });
  
  attachSearch(); // প্রথমবার সার্চ কানেক্ট
}

// ২. ডাইনামিক স্কোয়াড বক্স তৈরি
function genSquadFields() {
  const hList = document.getElementById("homeSquadList");
  const aList = document.getElementById("awaySquadList");
  hList.innerHTML = '<div class="section-title">Home Squad</div>';
  aList.innerHTML = '<div class="section-title">Away Squad</div>';
  
  for(let i=1; i<=adminPCount; i++) {
    hList.innerHTML += `<label>Player ${i}</label><div class="searchBox"><input type="text" class="p-search" placeholder="Search..."><div class="dropdown"></div></div>`;
    aList.innerHTML += `<label>Player ${i}</label><div class="searchBox"><input type="text" class="p-search" placeholder="Search..."><div class="dropdown"></div></div>`;
  }
  attachSearch(); // নতুন বক্সগুলোর জন্য আবার সার্চ কানেক্ট
}

// ৩. সার্চ লজিক (The Fix)
function attachSearch() {
  document.querySelectorAll('.p-search').forEach(input => {
    const list = input.parentElement.querySelector('.dropdown');

    input.oninput = () => {
      const val = input.value.trim().toLowerCase();
      list.innerHTML = "";
      
      if(val.length < 1) { 
        list.style.display="none"; 
        return; 
      }

      const filtered = allPlayers.filter(n => n.toLowerCase().includes(val)).slice(0,5);
      
      if(filtered.length > 0) {
        list.style.display = "block";
        filtered.forEach(n => {
          let d = document.createElement("div"); 
          d.textContent = n;
          d.onclick = () => { 
            input.value = n; 
            list.style.display="none"; 
          };
          list.appendChild(d);
        });
      } else {
        list.style.display = "none";
      }
    };
    
    // বাইরে ক্লিক করলে লিস্ট বন্ধ হওয়া
    input.onblur = () => setTimeout(() => list.style.display="none", 200);
  });
}

// ৪. UI পরিবর্তন
function toggleMatchUI() {
  const type = document.getElementById("matchType").value;
  const isTourney = type === "Tournament";
  document.getElementById("teamInfo").style.display = isTourney ? "block" : "none";
  document.getElementById("teamFields").style.display = isTourney ? "block" : "none";
  document.getElementById("singleFields").style.display = isTourney ? "none" : "block";
  document.getElementById("matchTitle").innerText = isTourney ? adminTName : "Match Center";
  if(isTourney) genSquadFields();
}

// ৫. সাবমিশন লজিক
async function submitReport() {
  const subBtn = document.getElementById("subBtn");
  const type = document.getElementById("matchType").value;
  const score = document.getElementById("score").value;

  if(!score) return alert("Please enter final score!");

  subBtn.disabled = true;
  subBtn.innerText = "Submitting...";

  const report = {
    type: type,
    tName: type === "Tournament" ? adminTName : "Friendly Match",
    score: score,
    hTeamName: document.getElementById("hTeam").value || "",
    aTeamName: document.getElementById("aTeam").value || "",
    status: "pending",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  const inputs = document.querySelectorAll(type === "Tournament" ? "#teamFields .p-search" : "#singleFields .p-search");
  report.players = Array.from(inputs).map(i => i.value).filter(v => v !== "");

  try {
    await db.collection("matches").add(report);
    alert("Match Report Submitted for Review!");
    location.reload();
  } catch(e) {
    alert("Error: " + e.message);
    subBtn.disabled = false;
  }
}

window.onload = loadData;
</script>
</body>
</html>
