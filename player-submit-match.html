<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Submit Match | AFNS Elite Strikers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{ --neon:#00f7ff; --gold:#ffd700; --bg-dark:#050a12; }
body{ 
    margin:0; min-height:100vh; padding:20px; 
    display:flex; flex-direction:column; align-items:center; 
    background: radial-gradient(circle at top right, rgba(0,247,255,0.1), transparent), var(--bg-dark); 
    font-family: 'Segoe UI', sans-serif; color:white; 
}
.container{ 
    width:100%; max-width:650px; background: rgba(13, 25, 41, 0.85); 
    border-radius:24px; padding:30px; border: 1px solid rgba(255,255,255,0.1); 
    backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
}
h2{text-align:center; color:var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px;}
.section-title{ color: var(--neon); font-size: 14px; font-weight: bold; margin: 25px 0 10px; text-transform: uppercase; border-bottom: 1px solid rgba(0,247,255,0.2); padding-bottom: 5px;}
label{display:block; margin-top:12px; font-size: 12px; font-weight: 600; color: #aaa;}
input, select, button{ width:100%; padding:14px; margin-top:6px; border-radius:12px; border:none; box-sizing: border-box; outline:none; transition: 0.3s;}
input, select{ background: rgba(0,0,0,0.4); color:#fff; border: 1px solid rgba(0,247,255,0.2); font-size: 15px;}
input:focus{ border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 247, 255, 0.2); }
.squad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.searchBox{ position:relative; }

/* DROPDOWN STYLING */
.dropdown{ 
    position:absolute; width:100%; background:#0d1929; 
    max-height:180px; overflow-y:auto; border-radius:10px; 
    z-index:999; border:1px solid var(--neon); display:none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.dropdown div{ padding:12px; cursor:pointer; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff;}
.dropdown div:hover{ background: var(--neon); color:#000; font-weight: bold;}

button{ 
    background: linear-gradient(135deg, var(--neon), #008cff); color:#000; 
    font-weight:800; cursor:pointer; margin-top:35px; 
    text-transform: uppercase; letter-spacing: 1px;
}
button:hover{ transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 247, 255, 0.4); }
button:disabled{ opacity: 0.6; cursor: not-allowed; }

.btn-home{ background: transparent; border: 1px solid #444; color: #aaa; margin-top: 10px;}
</style>
</head>
<body>

<div class="container">
  <h2 id="matchTitle">Match Center</h2>

  <label>Select Match Mode</label>
  <select id="matchType" onchange="toggleMatchUI()">
    <option value="Friendly">Friendly Match (1v1)</option>
    <option value="Tournament">Squad War (Team Battle)</option>
  </select>

  <div id="teamInfo" style="display:none;">
    <div class="squad-grid">
      <div><label>Home Team Name</label><input type="text" id="hTeam" placeholder="Team A"></div>
      <div><label>Away Team Name</label><input type="text" id="aTeam" placeholder="Team B"></div>
    </div>
  </div>

  <div id="squadArea">
    <div id="singleFields">
      <div class="squad-grid">
        <div>
            <label>Home Player</label>
            <div class="searchBox">
                <input type="text" class="p-search" placeholder="Search Username..." autocomplete="off">
                <div class="dropdown"></div>
            </div>
        </div>
        <div>
            <label>Away Player</label>
            <div class="searchBox">
                <input type="text" class="p-search" placeholder="Search Username..." autocomplete="off">
                <div class="dropdown"></div>
            </div>
        </div>
      </div>
    </div>

    <div id="teamFields" style="display:none;">
      <div class="squad-grid">
        <div id="homeSquadList"></div>
        <div id="awaySquadList"></div>
      </div>
    </div>
  </div>

  <div class="section-title">Final Result</div>
  <label>Enter Score (Home - Away)</label>
  <input type="text" id="score" placeholder="e.g. 2 - 1" style="text-align: center; font-size: 20px; font-weight: bold; letter-spacing: 5px;">

  <button id="subBtn" onclick="submitReport()">Submit for Review</button>
  <button class="btn-home" onclick="location.href='profile.html'">Back to Profile</button>
</div>

<script>
firebase.initializeApp({ 
    apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM", 
    authDomain:"afnsclub.firebaseapp.com", 
    projectId:"afnsclub" 
});
const db = firebase.firestore();

let allPlayers = []; 
let adminTName = "Friendly"; 
let adminPCount = 1;

// Load Tournament Settings & Player List
async function loadData() {
  const settings = await db.collection("settings").doc("tournament").get();
  if(settings.exists) {
    adminTName = settings.data().currentTournament || "Elite League";
    adminPCount = settings.data().playerCount || 1;
  }

  const snap = await db.collection("players").get();
  allPlayers = [];
  snap.forEach(doc => {
    const p = doc.data();
    if(p.username) allPlayers.push({ name: p.username, id: doc.id });
  });
  
  attachSearch();
}

function genSquadFields() {
  const hList = document.getElementById("homeSquadList");
  const aList = document.getElementById("awaySquadList");
  hList.innerHTML = '<div class="section-title">Home Squad</div>';
  aList.innerHTML = '<div class="section-title">Away Squad</div>';
  
  for(let i=1; i<=adminPCount; i++) {
    hList.innerHTML += `<label>Player ${i}</label><div class="searchBox"><input type="text" class="p-search" placeholder="Search..." autocomplete="off"><div class="dropdown"></div></div>`;
    aList.innerHTML += `<label>Player ${i}</label><div class="searchBox"><input type="text" class="p-search" placeholder="Search..." autocomplete="off"><div class="dropdown"></div></div>`;
  }
  attachSearch();
}

function attachSearch() {
  document.querySelectorAll('.p-search').forEach(input => {
    const list = input.parentElement.querySelector('.dropdown');

    input.oninput = () => {
      const val = input.value.trim().toLowerCase();
      list.innerHTML = "";
      
      if(val.length < 1) { 
        list.style.display="none"; 
        return; 
      }

      const filtered = allPlayers.filter(p => p.name.toLowerCase().includes(val)).slice(0,5);
      
      if(filtered.length > 0) {
        list.style.display = "block";
        filtered.forEach(p => {
          let d = document.createElement("div"); 
          d.textContent = p.name;
          d.setAttribute('data-id', p.id);
          d.onclick = () => { 
            input.value = p.name;
            input.setAttribute('data-uid', p.id); // Store UID for rating logic
            list.style.display="none"; 
          };
          list.appendChild(d);
        });
      } else {
        list.style.display = "none";
      }
    };
    
    input.onblur = () => setTimeout(() => list.style.display="none", 250);
  });
}

function toggleMatchUI() {
  const type = document.getElementById("matchType").value;
  const isTourney = type === "Tournament";
  document.getElementById("teamInfo").style.display = isTourney ? "block" : "none";
  document.getElementById("teamFields").style.display = isTourney ? "block" : "none";
  document.getElementById("singleFields").style.display = isTourney ? "none" : "block";
  document.getElementById("matchTitle").innerText = isTourney ? adminTName : "Match Center";
  if(isTourney) genSquadFields();
}

async function submitReport() {
  const subBtn = document.getElementById("subBtn");
  const type = document.getElementById("matchType").value;
  const score = document.getElementById("score").value;
  
  // Validation
  const inputs = document.querySelectorAll(type === "Tournament" ? "#teamFields .p-search" : "#singleFields .p-search");
  const players = Array.from(inputs).map(i => i.value).filter(v => v !== "");
  const playerIds = Array.from(inputs).map(i => i.getAttribute('data-uid')).filter(v => v !== null);

  if(players.length < (type === "Tournament" ? 2 : 2)) return alert("Please fill in all player names!");
  if(!score.includes("-")) return alert("Please use '-' in score (e.g. 2-1)");

  subBtn.disabled = true;
  subBtn.innerText = "Processing...";

  const report = {
    type: type,
    tName: type === "Tournament" ? adminTName : "Friendly Match",
    score: score.replace(/\s/g, ""), // Remove spaces
    hTeamName: document.getElementById("hTeam").value || players[0],
    aTeamName: document.getElementById("aTeam").value || players[players.length-1],
    players: players,
    status: "pending",
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    
    // Compatibility for Old System (Admin Approval logic expects these)
    player1: players[0],
    player2: players[players.length-1],
    player1Id: playerIds[0] || "",
    player2Id: playerIds[playerIds.length-1] || ""
  };

  try {
    await db.collection("matches").add(report);
    alert("✅ Match Submitted! Admin will review and update ratings soon.");
    location.href = 'profile.html';
  } catch(e) {
    alert("❌ Error: " + e.message);
    subBtn.disabled = false;
    subBtn.innerText = "Submit Match";
  }
}

window.onload = loadData;
</script>
</body>
</html>
