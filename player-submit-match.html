<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Match | AFNS Elite Strikers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{
  --neon:#00f7ff;
  --gold:#ffd700;
  --bg-dark:#02060c;
  --card-glass:rgba(255, 255, 255, 0.05);
}
body{
  margin:0; min-height:100vh;
  display:flex; flex-direction: column; align-items:center;
  padding:20px;
  background: radial-gradient(circle at 10% 20%, rgba(0, 247, 255, 0.15), transparent 40%),
              radial-gradient(circle at 90% 80%, rgba(255, 215, 0, 0.1), transparent 40%),
              #050a12;
  font-family: 'Segoe UI', Roboto, sans-serif; color:white;
}
.container{
  width:100%; max-width:480px; background: rgba(13, 25, 41, 0.8);
  border-radius:24px; padding:30px; margin-top:10px;
  backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
h2{text-align:center; color:var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px;}
label{display:block; margin-top:15px; font-weight:600; font-size: 13px; color: var(--neon); text-transform: uppercase;}
input, select, button{ width:100%; padding:14px; margin-top:8px; border:none; border-radius:12px; box-sizing: border-box; outline: none;}
input, select{ background: rgba(0,0,0,0.4); color:#fff; border: 1px solid rgba(0, 247, 255, 0.2); transition: 0.3s;}
input:focus{ border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 247, 255, 0.2);}
button{ background: linear-gradient(135deg, var(--neon), #008cff); color:#000; font-weight:800; cursor:pointer; margin-top: 25px; transition: 0.3s; text-transform: uppercase;}
button:active{ transform: scale(0.98);}
.msg{ margin-top:15px; text-align:center; font-weight:600;}
.searchBox{ position:relative;}
.dropdown{ position:absolute; width:100%; background:#0d1929; max-height:160px; overflow-y:auto; border-radius:12px; z-index:1000; border: 1px solid var(--neon);}
.dropdown div{ padding:12px; cursor:pointer; border-bottom: 1px solid rgba(255,255,255,0.05);}
.dropdown div:hover{ background: var(--neon); color:#000;}

/* কার্ড ডিসপ্লে */
#cardContainer { display:none; margin-top: 25px; width: 100%; text-align: center; }
#resultCanvas { width: 100%; border-radius: 16px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
.download-btn { background: var(--gold); color: #000; margin-top: 15px; }
</style>
</head>
<body>

<div class="container">
  <h2>Match Center</h2>

  <label>Match Mode</label>
  <select id="matchCategory" onchange="toggleMatchMode()">
    <option value="1v1">Individual (1vs1)</option>
    <option value="team">Squad War (Team)</option>
  </select>

  <div id="teamSection" style="display:none;">
    <label>Home Team</label>
    <input type="text" id="homeTeam" placeholder="e.g. ARGENTINA PES">
    <label>Away Team</label>
    <input type="text" id="awayTeam" placeholder="e.g. BRAZIL STARS">
  </div>

  <label id="p1Label">Home Player</label>
  <div class="searchBox">
    <input type="text" id="player1" onkeyup="filterPlayers('player1')" autocomplete="off" placeholder="Search Player...">
    <div id="player1List" class="dropdown"></div>
  </div>

  <label id="p2Label">Away Player</label>
  <div class="searchBox">
    <input type="text" id="player2" onkeyup="filterPlayers('player2')" autocomplete="off" placeholder="Search Player...">
    <div id="player2List" class="dropdown"></div>
  </div>

  <label>Final Score (e.g. 2 - 1)</label>
  <input type="text" id="score" placeholder="X - X">

  <label>Event Type</label>
  <select id="matchType" onchange="toggleTournament()">
    <option value="Friendly">Friendly Match</option>
    <option value="Tournament">Elite Tournament</option>
  </select>

  <div id="tournamentBox" style="display:none;">
    <label>Tournament Name</label>
    <input type="text" id="tournamentName" placeholder="Elite Season 5">
  </div>

  <button id="submitBtn" onclick="submitMatch()">Submit & Generate Card</button>
  <div id="message" class="msg"></div>

  <div id="cardContainer">
    <canvas id="resultCanvas"></canvas>
    <button class="download-btn" onclick="downloadCard()">Download Result Image</button>
  </div>
</div>

<script>
// Firebase Initialization
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});
const db = firebase.firestore();
const auth = firebase.auth();
let allPlayers = [];

auth.onAuthStateChanged(user => { if(!user) location.href="login.html"; else loadPlayers(); });

async function loadPlayers(){
  const snap = await db.collection("players").get();
  snap.forEach(doc => allPlayers.push(doc.data().username || doc.id));
}

function toggleMatchMode() {
  const isTeam = document.getElementById("matchCategory").value === "team";
  document.getElementById("teamSection").style.display = isTeam ? "block" : "none";
  document.getElementById("p1Label").innerText = isTeam ? "Home Representative" : "Home Player";
  document.getElementById("p2Label").innerText = isTeam ? "Away Representative" : "Away Player";
}

function toggleTournament() {
  document.getElementById("tournamentBox").style.display = 
    document.getElementById("matchType").value === "Tournament" ? "block" : "none";
}

function filterPlayers(id){
  const input = document.getElementById(id);
  const list = document.getElementById(id+"List");
  const val = input.value.toLowerCase();
  list.innerHTML = "";
  if(val.length < 1) return;
  allPlayers.filter(n => n.toLowerCase().includes(val)).slice(0,5).forEach(n => {
    let d = document.createElement("div"); d.textContent = n;
    d.onclick = () => { input.value = n; list.innerHTML = ""; };
    list.appendChild(d);
  });
}

async function submitMatch(){
  const msg = document.getElementById("message");
  const data = {
    p1: document.getElementById("player1").value,
    p2: document.getElementById("player2").value,
    score: document.getElementById("score").value,
    mode: document.getElementById("matchCategory").value,
    type: document.getElementById("matchType").value,
    tName: document.getElementById("tournamentName").value || "Friendly Match",
    hTeam: document.getElementById("homeTeam").value || "HOME",
    aTeam: document.getElementById("awayTeam").value || "AWAY"
  };

  if(!data.p1 || !data.p2 || !data.score) { msg.innerHTML = "<span style='color:red'>Fill all fields!</span>"; return; }

  msg.innerHTML = "Saving to Database...";
  try {
    await db.collection("matches").add({ ...data, createdAt: new Date() });
    msg.innerHTML = "<span style='color:var(--neon)'>Success! Creating Premium Card...</span>";
    drawPremiumCard(data);
  } catch(e) { msg.innerHTML = "Error: " + e.message; }
}

function drawPremiumCard(data) {
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 1000; canvas.height = 500;
  
  // Background Gradient
  const grad = ctx.createLinearGradient(0, 0, 1000, 500);
  grad.addColorStop(0, '#020b16'); grad.addColorStop(1, '#051937');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1000, 500);

  // Decorative Shapes
  ctx.fillStyle = 'rgba(0, 247, 255, 0.05)';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(400,0); ctx.lineTo(300,500); ctx.lineTo(0,500); ctx.fill();

  // Load Logo
  const logo = new Image();
  logo.src = 'logo.png'; 
  logo.onload = () => {
    ctx.drawImage(logo, 450, 30, 100, 100);
    
    // Match Info Header
    ctx.fillStyle = varColor('--gold');
    ctx.font = 'bold 25px Arial'; ctx.textAlign = 'center';
    ctx.fillText(data.tName.toUpperCase(), 500, 160);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '18px Arial';
    ctx.fillText(new Date().toLocaleDateString(), 500, 190);

    // Score Section
    const s = data.score.split("-");
    drawScoreHex(ctx, 420, 220, s[0] || "0", '#ff4b2b'); // Home Score
    drawScoreHex(ctx, 510, 220, s[1] || "0", '#00d2ff'); // Away Score

    // Team/Player Names
    ctx.fillStyle = 'white'; ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'right'; ctx.fillText(data.mode === 'team' ? data.hTeam : data.p1, 400, 280);
    ctx.textAlign = 'left'; ctx.fillText(data.mode === 'team' ? data.aTeam : data.p2, 600, 280);
    
    // Sub-names (Representatives)
    if(data.mode === 'team'){
        ctx.font = '20px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.textAlign = 'right'; ctx.fillText("Capt: " + data.p1, 400, 310);
        ctx.textAlign = 'left'; ctx.fillText("Capt: " + data.p2, 600, 310);
    }

    // Footer
    ctx.fillStyle = 'rgba(0, 247, 255, 0.3)';
    ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
    ctx.fillText("AFNS ELITE STRIKERS OFFICIAL RESULT", 500, 460);
    
    document.getElementById("cardContainer").style.display = "block";
    document.getElementById("submitBtn").style.display = "none";
  };
}

function drawScoreHex(ctx, x, y, score, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, 75, 100, 10);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(score, x + 37, y + 70);
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function downloadCard() {
  const link = document.createElement('a');
  link.download = 'AFNS_Match_Result.png';
  link.href = document.getElementById('resultCanvas').toDataURL();
  link.click();
}

CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
  if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
  this.beginPath(); this.moveTo(x + r, y);
  this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r);
  this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r);
  this.closePath(); return this;
};
</script>

</body>
</html>
