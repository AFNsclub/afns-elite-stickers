<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Player vs Player | AFNS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
 --gold:#FFD700;
 --bg1:#010814;
 --bg2:#021b33;
 --card:rgba(0,0,0,.7);
 --win:#4cff8f;
 --lose:#ff4c4c;
 --draw:#ffd166;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
 background:radial-gradient(circle at top,var(--bg2),var(--bg1));
 color:#fff;
 padding:30px;
}
.container{
 max-width:900px;
 margin:auto;
 background:var(--card);
 padding:30px;
 border-radius:20px;
 box-shadow:0 0 40px rgba(0,0,0,.5);
}
h1{text-align:center;color:var(--gold);margin-bottom:25px;}
.compare-grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:20px;
 margin-bottom:30px;
}
.player-card{
 background:rgba(255,255,255,.05);
 padding:20px;
 border-radius:15px;
 text-align:center;
}
.player-card h2{color:var(--gold);margin-bottom:10px;}
.stat{margin:6px 0;font-weight:600;}
.vs{
 text-align:center;
 font-size:28px;
 font-weight:900;
 margin:20px 0;
 color:var(--gold);
}
.headtohead{
 text-align:center;
 margin:20px 0;
 font-size:18px;
 font-weight:700;
}
.win{color:var(--win)}
.lose{color:var(--lose)}
.draw{color:var(--draw)}
table{
 width:100%;
 border-collapse:collapse;
 margin-top:20px;
}
th,td{
 padding:10px;
 text-align:center;
 border-bottom:1px solid rgba(255,255,255,.2);
}
th{color:var(--gold);}
.chart-container{
 margin-top:30px;
 background:rgba(0,0,0,.3);
 padding:15px;
 border-radius:20px;
}
footer{
 text-align:center;
 margin-top:30px;
 color:var(--gold);
 font-weight:700;
}
@media(max-width:700px){
 .compare-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="container" id="app">

<h1>Player vs Player</h1>

<div class="compare-grid">
 <div class="player-card" id="p1Card">
   <h2 id="p1Name">Player 1</h2>
   <div class="stat">Rating: <span id="p1Rating">0</span></div>
   <div class="stat">Wins: <span id="p1Wins">0</span></div>
   <div class="stat">Losses: <span id="p1Losses">0</span></div>
   <div class="stat">Draws: <span id="p1Draws">0</span></div>
   <div class="stat">Win Rate: <span id="p1Rate">0%</span></div>
 </div>

 <div class="player-card" id="p2Card">
   <h2 id="p2Name">Player 2</h2>
   <div class="stat">Rating: <span id="p2Rating">0</span></div>
   <div class="stat">Wins: <span id="p2Wins">0</span></div>
   <div class="stat">Losses: <span id="p2Losses">0</span></div>
   <div class="stat">Draws: <span id="p2Draws">0</span></div>
   <div class="stat">Win Rate: <span id="p2Rate">0%</span></div>
 </div>
</div>

<div class="vs">VS</div>

<div class="headtohead" id="h2hResult">
Loading head-to-head...
</div>

<div class="chart-container">
 <canvas id="ratingCompareChart" height="200"></canvas>
</div>

<h2 style="text-align:center;color:var(--gold);margin-top:30px;">Match History</h2>

<table>
<thead>
<tr>
<th>Date</th>
<th>Score</th>
<th>Winner</th>
</tr>
</thead>
<tbody id="matchBody">
<tr><td colspan="3">Loading...</td></tr>
</tbody>
</table>

<footer>
© 2026 AFNS Elite Strikers
</footer>

</div>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
 authDomain:"afnsclub.firebaseapp.com",
 projectId:"afnsclub"
});
const db=firebase.firestore();

const params=new URLSearchParams(location.search);
const p1=params.get("p1");
const p2=params.get("p2");

if(!p1||!p2){
 document.getElementById("app").innerHTML="<h2>Invalid Compare URL</h2>";
 throw new Error("Missing IDs");
}

function loadPlayer(id,prefix){
 db.collection("players").doc(id).onSnapshot(doc=>{
  if(!doc.exists) return;
  const d=doc.data();
  document.getElementById(prefix+"Name").innerText=d.username||"Player";
  document.getElementById(prefix+"Rating").innerText=d.ratingAllTime||1000;
  document.getElementById(prefix+"Wins").innerText=d.wins||0;
  document.getElementById(prefix+"Losses").innerText=d.losses||0;
  document.getElementById(prefix+"Draws").innerText=d.draws||0;

  const total=(d.wins||0)+(d.losses||0)+(d.draws||0);
  document.getElementById(prefix+"Rate").innerText=
   total?((d.wins/total)*100).toFixed(1)+"%":"0%";
 });
}

loadPlayer(p1,"p1");
loadPlayer(p2,"p2");

/* HEAD TO HEAD */
db.collection("matches")
.where("status","==","approved")
.onSnapshot(snapshot=>{

 let p1Wins=0,p2Wins=0,draws=0;
 const tbody=document.getElementById("matchBody");
 tbody.innerHTML="";

 snapshot.forEach(doc=>{
  const m=doc.data();

  const matchBetween=
   (m.player1Id===p1&&m.player2Id===p2)||
   (m.player1Id===p2&&m.player2Id===p1);

  if(!matchBetween) return;

  if(m.winner===p1) p1Wins++;
  else if(m.winner===p2) p2Wins++;
  else draws++;

  const date=m.createdAt?
   m.createdAt.toDate().toLocaleDateString():"-";

  const winnerName=
   m.winner===p1?document.getElementById("p1Name").innerText:
   m.winner===p2?document.getElementById("p2Name").innerText:
   "Draw";

  tbody.innerHTML+=`
   <tr>
    <td>${date}</td>
    <td>${m.score||"-"}</td>
    <td>${winnerName}</td>
   </tr>
  `;
 });

 document.getElementById("h2hResult").innerHTML=
   `<span class="win">${p1Wins}</span> - 
    <span class="draw">${draws}</span> - 
    <span class="lose">${p2Wins}</span>`;
});

/* ===============================
   RATING COMPARE CHART
================================ */
const ctx=document.getElementById("ratingCompareChart").getContext("2d");
const ratingCompareChart=new Chart(ctx,{
 type:'line',
 data:{labels:[],datasets:[
   {label:'Player 1',data:[],borderColor:'#4cff8f',backgroundColor:'rgba(76,255,143,0.2)',tension:0.4,fill:true},
   {label:'Player 2',data:[],borderColor:'#ff4c4c',backgroundColor:'rgba(255,76,76,0.2)',tension:0.4,fill:true}
 ]},
 options:{
   responsive:true,
   plugins:{legend:{position:'top'}},
   scales:{y:{beginAtZero:false}}
 }
});

db.collection("ratingHistory")
.where("playerId","in",[p1,p2])
.orderBy("timestamp","asc")
.onSnapshot(snapshot=>{
 const p1Data=[],p2Data=[],labels=[];
 snapshot.forEach(doc=>{
   const r=doc.data();
   if(!r.timestamp||!r.rating) return;
   const date=r.timestamp.seconds?new Date(r.timestamp.seconds*1000).toLocaleDateString():new Date(r.timestamp).toLocaleDateString();
   if(!labels.includes(date)) labels.push(date);

   if(r.playerId===p1) p1Data.push(r.rating);
   else if(r.playerId===p2) p2Data.push(r.rating);
 });

 ratingCompareChart.data.labels=labels;
 ratingCompareChart.data.datasets[0].data=p1Data;
 ratingCompareChart.data.datasets[1].data=p2Data;
 ratingCompareChart.update();
});
</script>

</body>
  </html>
