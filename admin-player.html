<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Dashboard & Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#1a2f5c 0%,#0b1c33 40%,#1a0f1f 75%,#000 100%);
  color:#fff;
}
.container{max-width:1000px;margin:auto;padding:20px;}
header{text-align:center;margin-bottom:20px;}
header img{width:80px;}
table{width:100%;border-collapse:collapse;background:#0f2545;border-radius:12px;overflow:hidden;}
th, td{padding:12px;text-align:center;border-bottom:1px solid #081a2e;}
th{background:#081a2e;}
tr:hover{background:rgba(255,255,255,0.05);}
.highlight{background:linear-gradient(90deg,#ffd34d,#ff9800);color:#000;font-weight:bold;}
.badge{display:inline-block;padding:2px 8px;margin-left:4px;border-radius:12px;font-size:11px;color:#fff;}
.badge-legend{background:#ffcc00;}
.badge-elite{background:#ff3b3b;}
.badge-pro{background:#4db8ff;}
.badge-rising{background:#aaa;}
.filter-btns{margin-bottom:12px;text-align:center;}
.filter-btns button{margin:0 6px;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;}
.active-filter{background:#ffd700;color:#000;}
#winChart{margin-top:20px;background:#081a2e;padding:10px;border-radius:12px;}
.dashboard{margin-top:30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
.card{background:linear-gradient(145deg,#0f2545,#081a2e);padding:15px;border-radius:12px;text-align:center;}
.card h3{margin:5px 0;color:#ffd34d;}
</style>
</head>

<body>
<div class="container">
<header>
  <img src="logo.png" alt="AFNS Logo">
  <h2>AFNS Elite Dashboard & Leaderboard</h2>
</header>

<div class="filter-btns">
<button onclick="setSeason('all')" id="s_all" class="active-filter">All Season</button>
<button onclick="setSeason('S1')" id="s_S1">Season 1</button>
<button onclick="setSeason('S2')" id="s_S2">Season 2</button>
</div>

<!-- Leaderboard Table -->
<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Rating</th>
<th>Wins</th>
<th>Losses</th>
<th>Draws</th>
<th>Win %</th>
<th>Streak</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- Dashboard Cards -->
<div class="dashboard">
  <div class="card"><div>Total Players</div><h3 id="totalPlayers">0</h3></div>
  <div class="card"><div>Average Rating</div><h3 id="avgRating">0</h3></div>
  <div class="card"><div>Total Wins</div><h3 id="totalWins">0</h3></div>
  <div class="card"><div>Total Losses</div><h3 id="totalLosses">0</h3></div>
  <div class="card"><div>Total Draws</div><h3 id="totalDraws">0</h3></div>
</div>

<!-- Win% Graph -->
<canvas id="winChart" height="150"></canvas>

</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});

const auth=firebase.auth();
const db=firebase.firestore();
let uid="",username="",currentSeason="all";
let chart;

auth.onAuthStateChanged(user=>{
  if(!user){location="login.html";return;}
  uid=user.uid;
  db.collection("players").doc(uid).get().then(snap=>{
    username=snap.data()?.username||user.email.split("@")[0];
    loadLeaderboard();
  });
});

function setSeason(season){
  currentSeason=season;
  document.querySelectorAll(".filter-btns button").forEach(b=>b.classList.remove("active-filter"));
  document.getElementById("s_"+season).classList.add("active-filter");
  loadLeaderboard();
}

async function loadLeaderboard(){
  const tbody=document.querySelector("#leaderboard tbody");
  tbody.innerHTML="<tr><td colspan='8'>Loading...</td></tr>";

  const snap=await db.collection("players").get();
  let players=snap.docs.map(d=>{
    const p=d.data();
    return {
      username:p.username||"Unknown",
      rating:p.rating||1000,
      wins:p.wins||0,
      losses:p.losses||0,
      draws:p.draws||0,
      streak:p.streak||0,
      winRate:p.wins&&(p.wins+p.losses+p.draws)?Math.round(p.wins/(p.wins+p.losses+p.draws)*100):0
    };
  });

  // Dashboard Stats
  const totalPlayers = players.length;
  const avgRating = players.length ? Math.round(players.reduce((a,b)=>a+b.rating,0)/players.length) : 0;
  const totalWins = players.reduce((a,b)=>a+b.wins,0);
  const totalLosses = players.reduce((a,b)=>a+b.losses,0);
  const totalDraws = players.reduce((a,b)=>a+b.draws,0);

  document.getElementById("totalPlayers").innerText = totalPlayers;
  document.getElementById("avgRating").innerText = avgRating;
  document.getElementById("totalWins").innerText = totalWins;
  document.getElementById("totalLosses").innerText = totalLosses;
  document.getElementById("totalDraws").innerText = totalDraws;

  players.sort((a,b)=>b.rating-a.rating);
  tbody.innerHTML="";
  players.forEach((p,index)=>{
    const tr=document.createElement("tr");
    if(p.username===username) tr.classList.add("highlight");

    let badge="";
    if(p.rating>=2000) badge="<span class='badge badge-legend'>Legend</span>";
    else if(p.rating>=1500) badge="<span class='badge badge-elite'>Elite</span>";
    else if(p.rating>=1000) badge="<span class='badge badge-pro'>Pro</span>";
    else badge="<span class='badge badge-rising'>Rising</span>";

    tr.innerHTML=`
      <td>${index<3?`🏆${index+1}`:index+1}</td>
      <td>${p.username} ${badge}</td>
      <td>${p.rating}</td>
      <td>${p.wins}</td>
      <td>${p.losses}</td>
      <td>${p.draws}</td>
      <td>${p.winRate}%</td>
      <td>${p.streak>0?`🔥${p.streak}`:0}</td>
    `;
    tbody.appendChild(tr);
  });

  // Update Win% Chart
  const ctx = document.getElementById('winChart').getContext('2d');
  const labels = players.map(p=>p.username);
  const data = {
    labels,
    datasets: [{
      label: 'Win %',
      data: players.map(p=>p.winRate),
      borderColor:'#4cff8f',
      backgroundColor:'rgba(76,255,143,0.2)',
      tension:0.3
    }]
  };
  if(chart) chart.destroy();
  chart = new Chart(ctx,{type:'bar',data,options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}});
}

// Auto-refresh leaderboard every 15 seconds
setInterval(loadLeaderboard,15000);
</script>
</body>
</html>
