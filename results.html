<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Results | AFNS Elite Strikers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root { --neon: #00f7ff; --gold: #ffd700; --bg: #02060c; }
body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
header { padding: 40px; text-align: center; background: radial-gradient(circle, rgba(0,247,255,0.1), transparent); width: 100%; }
.gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; width: 90%; max-width: 1200px; padding: 20px; }
.card { background: rgba(13,25,41,0.8); border-radius: 15px; border: 1px solid rgba(255,215,0,0.2); padding: 10px; transition: 0.3s; }
.card:hover { transform: scale(1.02); border-color: var(--neon); }
.card img { width: 100%; border-radius: 10px; }
.download-btn { width: 100%; padding: 10px; margin-top: 10px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
#empty { display: none; color: #555; margin-top: 50px; }
</style>
</head>
<body>

<header>
  <h1 style="color:var(--gold); letter-spacing:3px;">OFFICIAL RESULTS</h1>
  <p>Cards valid for 12 hours after approval</p>
</header>

<div id="empty">No active matches to display.</div>
<div class="gallery" id="gallery"></div>

<script>
firebase.initializeApp({ apiKey: "AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM", authDomain: "afnsclub.firebaseapp.com", projectId: "afnsclub" });
const db = firebase.firestore();

function loadResults() {
  const now = Date.now();
  db.collection("approved_results")
    .where("expiresAt", ">", now)
    .orderBy("expiresAt", "desc")
    .onSnapshot(snap => {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      if (snap.empty) { document.getElementById("empty").style.display = "block"; return; }
      document.getElementById("empty").style.display = "none";
      
      snap.forEach(doc => {
        const d = doc.data();
        gallery.innerHTML += `
          <div class="card">
            <img src="${d.cardImage}" alt="Result">
            <button class="download-btn" onclick="downloadImage('${d.cardImage}')">DOWNLOAD CARD</button>
          </div>`;
      });
    });
}

function downloadImage(url) {
  const a = document.createElement('a');
  a.href = url; a.download = 'AFNS_Match_Result.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

window.onload = loadResults;
// প্রতি ১ মিনিটে চেক করবে এক্সপায়ার হয়েছে কি না
setInterval(loadResults, 60000);
</script>
</body>
</html>
