<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Official Results | AFNS Elite Strikers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --neon: #00f7ff;
  --gold: #ffd700;
  --bg: #02060c;
}

body {
  margin: 0; background: var(--bg); color: white;
  font-family: 'Segoe UI', Roboto, sans-serif;
  display: flex; flex-direction: column; align-items: center;
}

/* Header Section */
header {
  width: 100%; padding: 50px 20px; text-align: center;
  background: radial-gradient(circle at center, rgba(0, 247, 255, 0.1), transparent 70%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

header h1 {
  font-size: 32px; color: var(--gold); letter-spacing: 4px;
  text-transform: uppercase; margin: 0;
}

header p { color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-top: 10px; }

/* Gallery Layout */
.gallery-container {
  max-width: 1200px; width: 95%; padding: 40px 0;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 30px; justify-content: center;
}

/* Individual Card Style */
.result-card {
  background: rgba(13, 25, 41, 0.8); border-radius: 20px;
  padding: 12px; border: 1px solid rgba(255, 215, 0, 0.2);
  backdrop-filter: blur(10px); transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.result-card:hover {
  transform: translateY(-8px); border-color: var(--neon);
  box-shadow: 0 15px 40px rgba(0, 247, 255, 0.15);
}

.result-card img {
  width: 100%; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.05);
}

.card-footer {
  padding: 15px 5px 5px; text-align: center;
}

.match-title {
  font-size: 13px; font-weight: bold; color: var(--neon);
  text-transform: uppercase; margin-bottom: 12px; display: block;
}

.download-btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--gold), #b8860b);
  color: black; font-weight: 800; cursor: pointer;
  text-transform: uppercase; transition: 0.3s;
}

.download-btn:hover {
  background: linear-gradient(135deg, #fff, var(--gold));
  box-shadow: 0 0 15px var(--gold);
}

/* Empty State */
#no-results {
  grid-column: 1 / -1; text-align: center; padding: 50px;
  color: rgba(255, 255, 255, 0.3); font-size: 18px; display: none;
}

/* Responsive Fix */
@media (max-width: 480px) {
  header h1 { font-size: 24px; }
  .gallery-container { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>Match Gallery</h1>
  <p>Official Result Cards • Active for 12 Hours</p>
</header>

<div class="gallery-container" id="gallery">
  <div id="no-results">No active result cards available at the moment.</div>
  </div>

<script>
// Firebase Config
firebase.initializeApp({
  apiKey: "AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain: "afnsclub.firebaseapp.com",
  projectId: "afnsclub"
});

const db = firebase.firestore();

// --- কার্ড লোড করার ফাংশন ---
function loadActiveResults() {
  const now = Date.now();
  const gallery = document.getElementById("gallery");
  const noResults = document.getElementById("no-results");

  // শুধুমাত্র সেই কার্ডগুলো আনবে যেগুলোর expiresAt সময় বর্তমান সময়ের চেয়ে বেশি
  db.collection("approved_results")
    .where("expiresAt", ">", now)
    .orderBy("expiresAt", "desc")
    .onSnapshot(snap => {
      
      // পুরাতন ডাটা মুছে ফেলা (Real-time আপডেটের জন্য)
      const existingCards = gallery.querySelectorAll('.result-card');
      existingCards.forEach(card => card.remove());

      if (snap.empty) {
        noResults.style.display = "block";
        return;
      }

      noResults.style.display = "none";

      snap.forEach(doc => {
        const data = doc.data();
        const cardDiv = document.createElement("div");
        cardDiv.className = "result-card";
        
        cardDiv.innerHTML = `
          <img src="${data.cardImage}" alt="Match Result">
          <div class="card-footer">
            <span class="match-title">${data.hTeam} VS ${data.aTeam}</span>
            <button class="download-btn" onclick="downloadImage('${data.cardImage}', '${doc.id}')">
              Download Result
            </button>
          </div>
        `;
        gallery.appendChild(cardDiv);
      });
    });
}

// --- ইমেজ ডাউনলোড ফাংশন ---
function downloadImage(url, id) {
  const link = document.createElement('a');
  link.href = url;
  link.download = `AFNS_Result_${id.substring(0,5)}.png`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// পেজ লোড হলে শুরু করো
window.onload = loadActiveResults;

// প্রতি ১ মিনিটে একবার চেক করবে কোনো কার্ড এক্সপায়ার হয়েছে কিনা (অটো রিফ্রেশ ছাড়াই মুছে যাবে)
setInterval(() => {
    // এটি ফায়ারবেসের অন-স্ন্যাপশটকে অটো ট্রিগার করতে সাহায্য করবে সময় পরিবর্তনের সাথে
}, 60000);

</script>

</body>
</html>
