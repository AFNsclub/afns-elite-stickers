<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>🛠 Admin Panel | AFNS Elite Strikers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root { --neon: #00f7ff; --gold: #ffd700; --bg: #02060c; --card: rgba(13, 25, 41, 0.9); }
body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 750px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
h2 { text-align: center; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
.control-box { background: rgba(255, 215, 0, 0.05); border: 1px dashed var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 30px; }
.control-box input { background: rgba(0,0,0,0.3); color: #fff; border: 1px solid var(--gold); padding: 10px; border-radius: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
.btn-save { background: var(--gold); color: #000; width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
.match-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--neon); }
.match-info { font-size: 14px; margin-bottom: 10px; line-height: 1.6; }
.match-info b { color: var(--neon); }
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
.btn-approve { background: #00ff99; color: #000; }
.btn-delete { background: #ff4444; color: white; }
#resultCanvas { display: none; }
</style>
</head>

<body>

<div class="container">
  <h2>🛠 Admin Control Center</h2>
  <div class="control-box">
    <h3 style="margin-top:0; color:var(--gold); text-align:center;">Tournament Settings</h3>
    <label>Tournament Name:</label>
    <input type="text" id="tNameInput">
    <label>Players per Team:</label>
    <input type="number" id="pLimitInput">
    <button class="btn-save" onclick="updateSettings()">Save All Settings</button>
  </div>
  <div id="adminMatchList">Loading Matches...</div>
</div>

<canvas id="resultCanvas"></canvas>

<script>
// Firebase Initialization
firebase.initializeApp({
  apiKey: "AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain: "afnsclub.firebaseapp.com",
  projectId: "afnsclub"
});
const db = firebase.firestore();

// ১. সেটিংস আপডেট লজিক
async function updateSettings() {
    const name = document.getElementById("tNameInput").value;
    const limit = document.getElementById("pLimitInput").value;
    await db.collection("settings").doc("tournament").set({
        currentTournament: name,
        playerCount: parseInt(limit)
    });
    alert("Settings Saved!");
}

db.collection("settings").doc("tournament").onSnapshot(doc => {
    if(doc.exists) {
        document.getElementById("tNameInput").value = doc.data().currentTournament;
        document.getElementById("pLimitInput").value = doc.data().playerCount;
    }
});

// ২. রিয়েলটাইম ম্যাচ লিস্ট লোড
db.collection("matches").orderBy("createdAt", "desc").onSnapshot(snap => {
  const list = document.getElementById("adminMatchList");
  list.innerHTML = "";
  snap.forEach(doc => {
    const m = doc.data();
    const div = document.createElement("div");
    div.className = "match-card";
    div.innerHTML = `
      <div class="match-info">
        <b>ID:</b> ${doc.id.substring(0,6)} | <b>Event:</b> ${m.tName}<br>
        <b>Home:</b> ${m.hTeamName || m.players[0]} <br>
        <b>Away:</b> ${m.aTeamName || m.players[m.players.length-1]}<br>
        <b>Score:</b> <span style="font-size:18px; color:var(--gold)">${m.score}</span> | <b>Status:</b> ${m.status}
      </div>
      <div class="btn-group">
        ${m.status === 'pending' ? `<button class="btn-approve" onclick="approveMatch('${doc.id}')">Approve & Rank Up</button>` : ''}
        <button class="btn-delete" onclick="deleteMatch('${doc.id}')">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
});

// ৩. ম্যাচ এপ্রুভাল লজিক (পুরাতন ও নতুন সিস্টেমের সমন্বয়)
async function approveMatch(matchId) {
  if(!confirm("Approve this match? Stats and Ratings will be updated.")) return;

  const matchRef = db.collection("matches").doc(matchId);
  const mSnap = await matchRef.get();
  const m = mSnap.data();
  const scores = m.score.split("-").map(Number);
  
  let result = "draw"; 
  if(scores[0] > scores[1]) result = "homeWin";
  if(scores[1] > scores[0]) result = "awayWin";

  const half = Math.ceil(m.players.length / 2);
  const homePlayers = m.players.slice(0, half);
  const awayPlayers = m.players.slice(half);

  // প্রোফাইল পেজে রেটিং প্লাস-মাইনাস দেখানোর জন্য ট্র্যাকার
  let ratingLogs = { rB1: 0, rA1: 0, rB2: 0, rA2: 0 };

  const updatePlayerStats = async (pName, isWinner, isDraw, isHomeSide) => {
    const pQuery = await db.collection("players").where("username", "==", pName).get();
    if(!pQuery.empty) {
      const pDoc = pQuery.docs[0];
      const pRef = pDoc.ref;
      const pData = pDoc.data();
      
      let currentRating = Number(pData.ratingAllTime) || 1000;
      let ratingChange = isDraw ? 2 : (isWinner ? 15 : -10);
      let newRating = currentRating + ratingChange;

      // রেটিং হিস্ট্রি লগার (পুরাতন ডাটা ফিল্ড সাপোর্ট)
      if(isHomeSide) { ratingLogs.rB1 = currentRating; ratingLogs.rA1 = newRating; }
      else { ratingLogs.rB2 = currentRating; ratingLogs.rA2 = newRating; }
      
      await pRef.update({
        wins: firebase.firestore.FieldValue.increment(isWinner && !isDraw ? 1 : 0),
        losses: firebase.firestore.FieldValue.increment(!isWinner && !isDraw ? 1 : 0),
        draws: firebase.firestore.FieldValue.increment(isDraw ? 1 : 0),
        ratingAllTime: newRating,
        ratingSeason: firebase.firestore.FieldValue.increment(ratingChange)
      });
    }
  };

  try {
    // প্লেয়ারদের আপডেট করা
    for(let p of homePlayers) await updatePlayerStats(p, result === "homeWin", result === "draw", true);
    for(let p of awayPlayers) await updatePlayerStats(p, result === "awayWin", result === "draw", false);

    // ম্যাচ ডকুমেন্টে রেটিং লগ সেভ করা যাতে প্রোফাইল পেজ সেটা পড়তে পারে
    await matchRef.update({ 
      status: "approved",
      ratingBefore1: ratingLogs.rB1,
      ratingAfter1: ratingLogs.rA1,
      ratingBefore2: ratingLogs.rB2,
      ratingAfter2: ratingLogs.rA2,
      approvedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    await generateAndSaveCard(matchId, m);
    alert("✅ Match Approved Successfully!");
  } catch (e) {
    alert("Error: " + e.message);
  }
}

// ৪. রেজাল্ট কার্ড জেনারেটর
async function generateAndSaveCard(id, data) {
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 1000; canvas.height = 600;

  const grad = ctx.createLinearGradient(0, 0, 0, 600);
  grad.addColorStop(0, '#051937');
  grad.addColorStop(1, '#000000');
  ctx.fillStyle = grad; ctx.fillRect(0,0,1000,600);
  
  ctx.strokeStyle = '#00f7ff'; ctx.lineWidth = 10; ctx.strokeRect(20,20,960,560);
  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
  ctx.fillText(data.tName.toUpperCase(), 500, 100);
  
  ctx.fillStyle = 'white'; ctx.font = 'bold 120px Arial';
  ctx.fillText(data.score, 500, 320);

  ctx.font = 'bold 35px Arial';
  ctx.fillStyle = '#00f7ff';
  ctx.textAlign = 'right'; ctx.fillText(data.hTeamName || data.players[0], 400, 320);
  ctx.textAlign = 'left'; ctx.fillText(data.aTeamName || data.players[data.players.length-1], 600, 320);

  const cardImg = canvas.toDataURL("image/png");
  await db.collection("approved_results").doc(id).set({
    cardImage: cardImg,
    expiresAt: Date.now() + (24 * 60 * 60 * 1000), // ২৪ ঘণ্টা মেয়াদ
    tName: data.tName
  });
}

// ৫. ডিলিট ম্যাচ
async function deleteMatch(id) {
  if(confirm("Are you sure you want to delete this match record?")) {
    await db.collection("matches").doc(id).delete();
  }
}
</script>
</body>
</html>
