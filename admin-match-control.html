<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>🛠 Admin Panel | AFNS Elite Strikers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root { --neon: #00f7ff; --gold: #ffd700; --bg: #02060c; --card: rgba(13, 25, 41, 0.9); }

body {
  margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
  display: flex; flex-direction: column; align-items: center; padding: 20px;
}

.container {
  width: 100%; max-width: 600px; background: var(--card); border-radius: 20px;
  padding: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

h2 { text-align: center; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }

.match-card {
  background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px;
  border-left: 5px solid var(--neon); transition: 0.3s;
}

.match-info { font-size: 14px; margin-bottom: 10px; line-height: 1.6; }
.match-info b { color: var(--neon); }

.btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }

.btn-approve { background: #00ff99; color: #000; }
.btn-edit { background: var(--gold); color: #000; }
.btn-delete { background: #ff4444; color: white; }

#resultCanvas { display: none; } /* Hidden canvas for background processing */
</style>
</head>

<body>

<div class="container">
  <h2>🛠 Admin Match Control</h2>
  <div id="adminMatchList">লোডিং ম্যাচ লিস্ট...</div>
</div>

<canvas id="resultCanvas"></canvas>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain: "afnsclub.firebaseapp.com",
  projectId: "afnsclub"
});

const db = firebase.firestore();

// --- ১. ম্যাচ লিস্ট লোড করা ---
db.collection("matches").orderBy("createdAt", "desc").onSnapshot(snap => {
  const list = document.getElementById("adminMatchList");
  list.innerHTML = "";
  
  snap.forEach(doc => {
    const m = doc.data();
    const div = document.createElement("div");
    div.className = "match-card";
    
    div.innerHTML = `
      <div class="match-info">
        <b>ID:</b> ${doc.id.substring(0,6)}... | <b>Mode:</b> ${m.mode}<br>
        <b>Match:</b> ${m.hTeam} (${m.p1}) VS ${m.aTeam} (${m.p2})<br>
        <b>Score:</b> <span style="font-size:18px; color:var(--gold)">${m.score}</span> | <b>Status:</b> ${m.status}
      </div>
      <div class="btn-group">
        ${m.status === 'pending' ? `<button class="btn-approve" onclick="approveMatch('${doc.id}')">Approve</button>` : ''}
        <button class="btn-edit" onclick="editScore('${doc.id}', '${m.score}')">Edit</button>
        <button class="btn-delete" onclick="deleteMatch('${doc.id}')">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
});

// --- ২. ম্যাচ অ্যাপ্রুভ এবং প্লেয়ার ডাটা আপডেট ---
async function approveMatch(id) {
  if(!confirm("আপনি কি এই ম্যাচটি অ্যাপ্রুভ করতে চান? এটি প্লেয়ারের স্ট্যাটাস আপডেট করবে।")) return;

  const matchRef = db.collection("matches").doc(id);
  const snap = await matchRef.get();
  const m = snap.data();

  // স্কোর আলাদা করা (e.g. "3-1" -> [3, 1])
  const s = m.score.split("-").map(Number);
  
  try {
    // Transaction ব্যবহার করে প্লেয়ার ডাটা আপডেট করা
    await db.runTransaction(async (transaction) => {
      const p1Ref = db.collection("players").doc(m.p1Id);
      const p2Ref = db.collection("players").doc(m.p2Id);
      
      const p1Snap = await transaction.get(p1Ref);
      const p2Snap = await transaction.get(p2Ref);

      let p1Data = p1Snap.data() || { wins:0, losses:0, draws:0 };
      let p2Data = p2Snap.data() || { wins:0, losses:0, draws:0 };

      // জয়-পরাজয় ক্যালকুলেশন
      if(s[0] > s[1]) { 
        p1Data.wins = (p1Data.wins || 0) + 1; 
        p2Data.losses = (p2Data.losses || 0) + 1; 
      } else if(s[1] > s[0]) { 
        p2Data.wins = (p2Data.wins || 0) + 1; 
        p1Data.losses = (p1Data.losses || 0) + 1; 
      } else { 
        p1Data.draws = (p1Data.draws || 0) + 1; 
        p2Data.draws = (p2Data.draws || 0) + 1; 
      }

      transaction.update(p1Ref, p1Data);
      transaction.update(p2Ref, p2Data);
      transaction.update(matchRef, { status: "approved" });
    });

    // কার্ড জেনারেট করে রেজাল্ট পেজে পাঠানো (১২ ঘণ্টা এক্সপায়ারি সহ)
    await generateAndSaveCard(id, m);
    
    alert("ম্যাচ অ্যাপ্রুভ হয়েছে এবং প্লেয়ার প্রোফাইল আপডেট হয়েছে! ✅");
  } catch (e) { alert("Error: " + e.message); }
}

// --- ৩. প্রিমিয়াম কার্ড জেনারেশন লজিক ---
async function generateAndSaveCard(id, data) {
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 1000; canvas.height = 500;

  // Background
  const grad = ctx.createLinearGradient(0, 0, 1000, 500);
  grad.addColorStop(0, '#020b16'); grad.addColorStop(1, '#051937');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1000, 500);

  // Logo loading
  const logo = new Image();
  logo.src = 'logo.png';
  await new Promise(res => logo.onload = res);
  ctx.drawImage(logo, 450, 30, 100, 100);

  // Text Info
  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center';
  ctx.fillText(data.tName.toUpperCase(), 500, 160);

  const s = data.score.split("-");
  // Draw Scores
  ctx.fillStyle = '#ff4b2b'; ctx.beginPath(); ctx.roundRect(410, 200, 80, 110, 10); ctx.fill();
  ctx.fillStyle = '#00d2ff'; ctx.beginPath(); ctx.roundRect(510, 200, 80, 110, 10); ctx.fill();
  
  ctx.fillStyle = 'white'; ctx.font = 'bold 70px Arial';
  ctx.fillText(s[0], 450, 280); ctx.fillText(s[1], 550, 280);

  // Team Names
  ctx.font = 'bold 45px Arial';
  ctx.textAlign = 'right'; ctx.fillText(data.mode === 'team' ? data.hTeam : data.p1, 380, 270);
  ctx.textAlign = 'left'; ctx.fillText(data.mode === 'team' ? data.aTeam : data.p2, 620, 270);

  const cardDataURL = canvas.toDataURL("image/png");
  const expiryTime = Date.now() + (12 * 60 * 60 * 1000); // ১২ ঘণ্টা পর

  // রেজাল্ট কালেকশনে সেভ
  await db.collection("approved_results").doc(id).set({
    cardImage: cardDataURL,
    expiresAt: expiryTime,
    hTeam: data.hTeam,
    aTeam: data.aTeam,
    approvedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

// --- ৪. এডিট এবং ডিলিট ---
async function editScore(id, oldScore) {
  const newScore = prompt("নতুন স্কোর দিন (যেমন: 2-0):", oldScore);
  if(newScore) {
    await db.collection("matches").doc(id).update({ score: newScore });
    alert("স্কোর আপডেট হয়েছে। পুনরায় Approve করলে নতুন কার্ড তৈরি হবে।");
  }
}

async function deleteMatch(id) {
  if(confirm("আপনি কি এই ম্যাচটি এবং এর রেজাল্ট কার্ড মুছে ফেলতে চান?")) {
    await db.collection("matches").doc(id).delete();
    await db.collection("approved_results").doc(id).delete();
    alert("মুছে ফেলা হয়েছে।");
  }
}

// Canvas rounded rect polyfill
CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
  if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
  this.moveTo(x + r, y);
  this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r);
  this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r);
  return this;
};
</script>

</body>
</html>
