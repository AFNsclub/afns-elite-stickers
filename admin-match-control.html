<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Admin | Match Control Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#050b1e;color:#fff;font-family:Arial}
.container{max-width:900px;margin:20px auto;padding:16px; max-height:90vh; overflow-y:auto;}
.card{background:#0b1622;border-radius:14px;padding:14px;margin-bottom:12px}
button{padding:8px 12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin:4px}
.approve{background:#00ff99}
.reject{background:#ff9900}
.rollback{background:#ff4444;color:#fff}
.recalc{background:#00c853;margin-bottom:15px}
</style>
</head>
<body>

<div class="container">
<h2>🛠 Match Control Panel</h2>
<button class="recalc" onclick="recalculateAllRatings()">🔥 Recalculate All Ratings</button>
<div id="list"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});

const db = firebase.firestore();

/* ===== BADGE UPDATE ===== */
function updateBadge(wins){
  if(wins>=8) return "👑 Elite";
  if(wins>=3) return "⚔ Pro";
  return "🛡 Rookie";
}

/* ===== APPROVE MATCH (Transaction-Safe) ===== */
async function approveMatch(matchId){
  const matchRef = db.collection("matches").doc(matchId);

  await db.runTransaction(async (tx) => {
    const matchSnap = await tx.get(matchRef);
    if(!matchSnap.exists) throw "Match not found";

    const m = matchSnap.data();
    if(m.status === "approved") throw "Already approved";

    const p1Ref = db.collection("players").doc(m.player1Id);
    const p2Ref = db.collection("players").doc(m.player2Id);

    const p1Snap = await tx.get(p1Ref);
    const p2Snap = await tx.get(p2Ref);
    if(!p1Snap.exists || !p2Snap.exists) throw "Player missing";

    let p1 = p1Snap.data();
    let p2 = p2Snap.data();

    // Ensure stats are numbers
    p1.wins = p1.wins||0; p1.losses = p1.losses||0; p1.draws = p1.draws||0;
    p2.wins = p2.wins||0; p2.losses = p2.losses||0; p2.draws = p2.draws||0;

    let r1All = p1.ratingAllTime||1000;
    let r2All = p2.ratingAllTime||1000;
    let r1Season = p1.ratingSeason||1000;
    let r2Season = p2.ratingSeason||1000;

    const [s1, s2] = m.score.split("-").map(Number);
    const K = m.matchType === "tournament"?48:32;

    const calc = (rA,rB,scoreA) => {
      const expected = 1/(1+Math.pow(10,(rB-rA)/400));
      return Math.round(rA + K*(scoreA-expected));
    }

    let a1=0, a2=0;
    if(s1 === s2){ a1 = a2 = 0.5; }
    else if(s1 > s2){ a1 = 1; a2 = 0; }
    else { a1 = 0; a2 = 1; }

    const newAll1 = calc(r1All,r2All,a1);
    const newAll2 = calc(r2All,r1All,a2);
    const newSeason1 = calc(r1Season,r2Season,a1);
    const newSeason2 = calc(r2Season,r1Season,a2);

    // Update stats
    if(s1 === s2){ p1.draws++; p2.draws++; }
    else if(s1 > s2){ p1.wins++; p2.losses++; }
    else { p2.wins++; p1.losses++; }

    tx.update(p1Ref,{
      ratingAllTime:newAll1,
      ratingSeason:newSeason1,
      wins:p1.wins,
      losses:p1.losses,
      draws:p1.draws,
      badge:updateBadge(p1.wins)
    });
    tx.update(p2Ref,{
      ratingAllTime:newAll2,
      ratingSeason:newSeason2,
      wins:p2.wins,
      losses:p2.losses,
      draws:p2.draws,
      badge:updateBadge(p2.wins)
    });

    tx.update(matchRef,{
      status:"approved",
      ratingBefore1:r1All,
      ratingBefore2:r2All,
      ratingBeforeSeason1:r1Season,
      ratingBeforeSeason2:r2Season,
      ratingAfter1:newAll1,
      ratingAfter2:newAll2,
      approvedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }).then(()=>alert("Match Approved ✅"))
    .catch(e=>alert("Error: "+e));
}

/* ===== REJECT ===== */
async function rejectMatch(id){
  await db.collection("matches").doc(id).update({status:"rejected"});
}

/* ===== ROLLBACK ===== */
async function rollbackMatch(matchId){
  const matchRef = db.collection("matches").doc(matchId);
  const snap = await matchRef.get();
  if(!snap.exists) return alert("Match not found");

  const m = snap.data();
  if(m.status !== "approved") return alert("Not approved yet");

  const p1Ref = db.collection("players").doc(m.player1Id);
  const p2Ref = db.collection("players").doc(m.player2Id);

  const p1Snap = await p1Ref.get();
  const p2Snap = await p2Ref.get();
  const d1 = p1Snap.data();
  const d2 = p2Snap.data();

  const [s1,s2] = m.score.split("-").map(Number);

  // Rollback stats
  d1.wins = d1.wins||0; d1.losses=d1.losses||0; d1.draws=d1.draws||0;
  d2.wins = d2.wins||0; d2.losses=d2.losses||0; d2.draws=d2.draws||0;

  const rollbackPlayer = (player, beforeAll, beforeSeason) => {
    return {
      ratingAllTime: beforeAll,
      ratingSeason: beforeSeason,
      wins: Math.max(0, player.wins - (s1>s2 ? 1 : (s2>s1?0:0))),
      losses: Math.max(0, player.losses - (s1<s2 ? 1 : (s2<s1?0:0))),
      draws: Math.max(0, player.draws - (s1===s2 ? 1 : 0))
    }
  }

  await p1Ref.update(rollbackPlayer(d1,m.ratingBefore1,m.ratingBeforeSeason1));
  await p2Ref.update(rollbackPlayer(d2,m.ratingBefore2,m.ratingBeforeSeason2));

  await matchRef.update({status:"rolledback"});
  alert("Match Rolled Back ✅");
}

/* ===== RECALCULATE ALL RATINGS (optional) ===== */
async function recalculateAllRatings(){
  if(!confirm("Are you sure? This will recalculate all ratings.")) return;

  const matchesSnap = await db.collection("matches").orderBy("createdAt").get();
  const playersSnap = await db.collection("players").get();
  let playerData = {};
  playersSnap.forEach(doc=>{playerData[doc.id] = { ...doc.data(), wins:0, losses:0, draws:0, ratingAllTime:1000, ratingSeason:1000 }; });

  matchesSnap.forEach(doc=>{
    const m = doc.data();
    if(m.status !== "approved") return;
    const p1 = playerData[m.player1Id];
    const p2 = playerData[m.player2Id];
    if(!p1 || !p2) return;
    const [s1,s2] = m.score.split("-").map(Number);
    const K = m.matchType === "tournament"?48:32;
    const calc = (rA,rB,scoreA)=> Math.round(rA + K*(scoreA - 1/(1+Math.pow(10,(rB-rA)/400))));
    let a1=0,a2=0;
    if(s1===s2){a1=a2=0.5;}
    else if(s1>s2){a1=1;a2=0;}
    else{a1=0;a2=1;}
    p1.ratingAllTime = calc(p1.ratingAllTime,p2.ratingAllTime,a1);
    p2.ratingAllTime = calc(p2.ratingAllTime,p1.ratingAllTime,a2);
    p1.ratingSeason = calc(p1.ratingSeason,p2.ratingSeason,a1);
    p2.ratingSeason = calc(p2.ratingSeason,p1.ratingSeason,a2);
    if(s1===s2){p1.draws++;p2.draws++;}
    else if(s1>s2){p1.wins++;p2.losses++;}
    else{p2.wins++;p1.losses++;}
  });

  // Update players
  for(const id in playerData){
    const p = playerData[id];
    await db.collection("players").doc(id).update({
      ratingAllTime: p.ratingAllTime,
      ratingSeason: p.ratingSeason,
      wins: p.wins,
      losses: p.losses,
      draws: p.draws,
      badge: updateBadge(p.wins)
    });
  }
  alert("All Ratings Recalculated ✅");
}

/* ===== LIVE LOAD MATCHES ===== */
db.collection("matches").orderBy("createdAt","desc").limit(50).onSnapshot(snapshot=>{
  const list = document.getElementById("list");
  list.innerHTML = "";
  snapshot.forEach(doc=>{
    const m = doc.data();
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <b>${m.player1}</b> vs <b>${m.player2}</b><br>
      Score: ${m.score}<br>
      Type: ${m.matchType}<br>
      Status: ${m.status}<br><br>
      ${m.status==="pending"?`
        <button class="approve" onclick="approveMatch('${doc.id}')">Approve</button>
        <button class="reject" onclick="rejectMatch('${doc.id}')">Reject</button>`:""}
      ${m.status==="approved"?`
        <button class="rollback" onclick="rollbackMatch('${doc.id}')">Rollback</button>`:""}
    `;
    list.appendChild(card);
  });
});
</script>

</body>
</html>
