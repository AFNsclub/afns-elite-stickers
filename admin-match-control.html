<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Strikers | Match System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{--neon:#00f7ff;--gold:#ffd700;--bg1:#02060c;--bg2:#0c1b2a;--card:rgba(0,0,0,.65);}
body{margin:0;min-height:100vh;font-family:Segoe UI,Arial,sans-serif;color:white;
display:flex;flex-direction:column;align-items:center;padding:20px;
background:radial-gradient(circle at top,var(--neon),transparent 40%),radial-gradient(circle at bottom,var(--gold),transparent 40%),linear-gradient(180deg,var(--bg2),var(--bg1));}
.container{width:100%;max-width:500px;background:var(--card);border-radius:20px;padding:25px;backdrop-filter:blur(12px);box-shadow:0 0 40px rgba(0,247,255,.35),0 0 20px rgba(255,215,0,.25);margin-bottom:30px;}
h2{text-align:center;color:var(--gold);}
label{display:block;margin-top:12px;font-weight:700;}
input,select,button{width:100%;padding:12px;margin-top:6px;border:none;border-radius:12px;}
input,select{background:#021420;color:#fff;}
button{background:linear-gradient(90deg,var(--neon),#008cff);color:#000;font-weight:900;cursor:pointer;}
.msg{margin-top:14px;text-align:center;font-weight:700;font-size:14px;min-height:20px;}
.error{color:#ff6b6b;}
.success{color:#4cff8f;}
.searchBox{position:relative;}
.dropdown{position:absolute;width:100%;background:#1a2438;max-height:150px;overflow-y:auto;border-radius:8px;z-index:1000;}
.dropdown div{padding:10px;cursor:pointer;}
.dropdown div:hover{background:var(--neon);color:black;}
.card{background:#0b1622;border-radius:14px;padding:14px;margin-bottom:12px;}
.approve{background:#00ff99;}
.reject{background:#ff9900;}
.rollback{background:#ff4444;color:#fff;}
.recalc{background:#00c853;margin-bottom:15px;}
</style>
</head>

<body>
<div class="container" id="submitContainer">
<h2>Submit Match</h2>

<label>Player 1</label>
<div class="searchBox">
<input type="text" id="player1" onkeyup="filterPlayers('player1')" autocomplete="off">
<div class="dropdown" id="player1List"></div>
</div>

<label>Player 2</label>
<div class="searchBox">
<input type="text" id="player2" onkeyup="filterPlayers('player2')" autocomplete="off">
<div class="dropdown" id="player2List"></div>
</div>

<label>Score (e.g., 3-2)</label>
<input type="text" id="score">

<label>Match Type</label>
<select id="matchType" onchange="toggleTournament()">
<option value="friendly">Friendly</option>
<option value="tournament">Tournament</option>
</select>

<div id="tournamentBox" style="display:none;">
<label>Tournament Name</label>
<input type="text" id="tournamentName">
</div>

<button onclick="submitMatch()">Submit Match</button>
<div class="msg" id="message"></div>
</div>

<div class="container" id="adminContainer">
<h2>🛠 Match Control Panel</h2>
<button class="recalc" onclick="recalculateAllRatings()">🔥 Recalculate All Ratings</button>
<div id="list"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});

const auth=firebase.auth();
const db=firebase.firestore();
let allPlayers=[], playerMap={};

/* ===== SEASON ===== */
function getSeasonIndex(month){if(month>=8)return 3;if(month>=4)return 2;return 1;}
function getCurrentSeasonId(){const now=new Date();return now.getFullYear()+"-S"+getSeasonIndex(now.getMonth());}

/* ===== AUTH ===== */
auth.onAuthStateChanged(user=>{
  if(!user)location.href="login.html";
  else loadPlayers();
});

/* ===== LOAD PLAYERS ===== */
async function loadPlayers(){
  const snap=await db.collection("players").get();
  snap.forEach(doc=>{const data=doc.data();allPlayers.push(data.username||doc.id);playerMap[data.username||doc.id]=doc.id;});
}

/* ===== FILTER SEARCH ===== */
function filterPlayers(type){
  const input=document.getElementById(type);
  const list=document.getElementById(type+"List");
  const value=input.value.toLowerCase();
  list.innerHTML="";
  if(value.length<1) return;
  allPlayers.filter(name=>name.toLowerCase().includes(value)).slice(0,10).forEach(name=>{
    const div=document.createElement("div");
    div.textContent=name;
    div.onclick=()=>{input.value=name; list.innerHTML="";};
    list.appendChild(div);
  });
}
function toggleTournament(){document.getElementById("tournamentBox").style.display=document.getElementById("matchType").value==="tournament"?"block":"none";}

/* ===== UPDATE BADGE ===== */
function updateBadge(wins){if(wins>=8)return "👑 Elite";if(wins>=3)return "⚔ Pro";return "🛡 Rookie";}

/* ===== SUBMIT MATCH ===== */
async function submitMatch(){
  const msg=document.getElementById("message");
  msg.innerHTML="";
  const p1=document.getElementById("player1").value.trim();
  const p2=document.getElementById("player2").value.trim();
  const score=document.getElementById("score").value.trim();
  const type=document.getElementById("matchType").value;
  const tName=document.getElementById("tournamentName").value.trim();
  if(!p1||!p2||!score){msg.innerHTML="<span class='error'>All fields required!</span>"; return;}
  if(p1===p2){msg.innerHTML="<span class='error'>Players cannot be same!</span>"; return;}
  if(!allPlayers.includes(p1)||!allPlayers.includes(p2)){msg.innerHTML="<span class='error'>Invalid player!</span>";return;}
  if(!/^\d+-\d+$/.test(score)){msg.innerHTML="<span class='error'>Invalid score format!</span>";return;}
  if(type==="tournament"&&!tName){msg.innerHTML="<span class='error'>Tournament name required!</span>";return;}

  const parts=score.split("-").map(Number);
  let winner=null,loser=null,resultType="draw";
  if(parts[0]>parts[1]){winner=p1;loser=p2;resultType="win";}
  else if(parts[1]>parts[0]){winner=p2;loser=p1;resultType="win";}

  const dup=await db.collection("matches")
    .where("player1","in",[p1,p2])
    .where("player2","in",[p1,p2])
    .where("score","==",score).get();
  if(!dup.empty){msg.innerHTML="<span class='error'>Duplicate match detected!</span>";return;}

  await db.collection("matches").add({
    player1:p1,player2:p2,player1Id:playerMap[p1],player2Id:playerMap[p2],
    score:score,winner:winner,loser:loser,resultType:resultType,
    seasonId:getCurrentSeasonId(),matchType:type,
    tournamentName:type==="tournament"?tName:null,
    submittedBy:auth.currentUser.email,status:"pending",
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  msg.innerHTML="<span class='success'>Match submitted for approval!</span>";
  document.getElementById("player1").value="";document.getElementById("player2").value="";document.getElementById("score").value="";document.getElementById("tournamentName").value="";
}

/* ===== ADMIN ACTIONS (APPROVE/REJECT/ROLLBACK) ===== */
async function approveMatch(matchId){
  const matchRef=db.collection("matches").doc(matchId);

  await db.runTransaction(async tx=>{
    const mSnap=await tx.get(matchRef);
    if(!mSnap.exists) throw "Match not found";

    const m=mSnap.data();
    if(m.status==="approved") throw "Already approved";

    const p1Ref=db.collection("players").doc(m.player1Id);
    const p2Ref=db.collection("players").doc(m.player2Id);

    const p1Snap=await tx.get(p1Ref);
    const p2Snap=await tx.get(p2Ref);

    let p1=p1Snap.data();
    let p2=p2Snap.data();

    p1.wins=p1.wins||0;
    p1.losses=p1.losses||0;
    p1.draws=p1.draws||0;

    p2.wins=p2.wins||0;
    p2.losses=p2.losses||0;
    p2.draws=p2.draws||0;

    let r1All=p1.ratingAllTime||1000;
    let r2All=p2.ratingAllTime||1000;

    let r1Season=p1.ratingSeason||1000;
    let r2Season=p2.ratingSeason||1000;

    const [s1,s2]=m.score.split("-").map(Number);
    const K=m.matchType==="tournament"?48:32;

    const calc=(rA,rB,scoreA)=>
      Math.round(rA+K*(scoreA-1/(1+Math.pow(10,(rB-rA)/400))));

    let a1=0,a2=0;

    if(s1===s2){ a1=a2=0.5; }
    else if(s1>s2){ a1=1;a2=0; }
    else{ a1=0;a2=1; }

    const newAll1=calc(r1All,r2All,a1);
    const newAll2=calc(r2All,r1All,a2);

    const newSeason1=calc(r1Season,r2Season,a1);
    const newSeason2=calc(r2Season,r1Season,a2);

    if(s1===s2){
      p1.draws++; p2.draws++;
    }else if(s1>s2){
      p1.wins++; p2.losses++;
    }else{
      p2.wins++; p1.losses++;
    }

    tx.update(p1Ref,{
      ratingAllTime:newAll1,
      ratingSeason:newSeason1,
      wins:p1.wins,
      losses:p1.losses,
      draws:p1.draws,
      badge:updateBadge(p1.wins)
    });

    tx.update(p2Ref,{
      ratingAllTime:newAll2,
      ratingSeason:newSeason2,
      wins:p2.wins,
      losses:p2.losses,
      draws:p2.draws,
      badge:updateBadge(p2.wins)
    });

    tx.update(matchRef,{
      status:"approved",
      ratingBefore1:r1All,
      ratingBefore2:r2All,
      ratingBeforeSeason1:r1Season,
      ratingBeforeSeason2:r2Season,
      ratingAfter1:newAll1,
      ratingAfter2:newAll2,
      approvedAt:firebase.firestore.FieldValue.serverTimestamp(),
      ratingChange:{
        [m.player1]: newAll1-r1All,
        [m.player2]: newAll2-r2All
      }
    });
  });

  alert("Match Approved ✅");
}
}

async function rejectMatch(id){await db.collection("matches").doc(id).update({status:"rejected"});}
async function rollbackMatch(id){
  const mRef=db.collection("matches").doc(id);const snap=await mRef.get();if(!snap.exists)return alert("Match not found");const m=snap.data();
  if(m.status!=="approved")return alert("Not approved yet");
  const p1Ref=db.collection("players").doc(m.player1Id),p2Ref=db.collection("players").doc(m.player2Id);
  const p1Snap=await p1Ref.get(),p2Snap=await p2Ref.get();const d1=p1Snap.data(),d2=p2Snap.data();
  const [s1,s2]=m.score.split("-").map(Number);d1.wins=d1.wins||0;d1.losses=d1.losses||0;d1.draws=d1.draws||0;d2.wins=d2.wins||0;d2.losses=d2.losses||0;d2.draws=d2.draws||0;
  const rollbackPlayer=(player,beforeAll,beforeSeason)=>({ratingAllTime:beforeAll,ratingSeason:beforeSeason,wins:Math.max(0,player.wins-(s1>s2?1:(s2>s1?0:0))),losses:Math.max(0,player.losses-(s1<s2?1:(s2<s1?0:0))),draws:Math.max(0,player.draws-(s1===s2?1:0))});
  await p1Ref.update(rollbackPlayer(d1,m.ratingBefore1,m.ratingBeforeSeason1));
  await p2Ref.update(rollbackPlayer(d2,m.ratingBefore2,m.ratingBeforeSeason2));
  await mRef.update({status:"rolledback"});
  alert("Match Rolled Back ✅");
}

/* ===== RECALCULATE RATINGS ===== */
async function recalculateAllRatings(){
  if(!confirm("Are you sure? Recalculate all ratings?")) return;
  const matchesSnap=await db.collection("matches").orderBy("createdAt").get();
  const playersSnap=await db.collection("players").get();let pdata={};
  playersSnap.forEach(doc=>{pdata[doc.id]={...doc.data(),wins:0,losses:0,draws:0,ratingAllTime:1000,ratingSeason:1000};});
  matchesSnap.forEach(doc=>{const m=doc.data();if(m.status!=="approved")return;const p1=pdata[m.player1Id],p2=pdata[m.player2Id];if(!p1||!p2)return;
    const [s1,s2]=m.score.split("-").map(Number),K=m.matchType==="tournament"?48:32;
    const calc=(rA,rB,scoreA)=>Math.round(rA+K*(scoreA-1/(1+Math.pow(10,(rB-rA)/400))));
    let a1=0,a2=0;if(s1===s2){a1=a2=0.5;}else if(s1>s2){a1=1;a2=0;}else{a1=0;a2=1;}
    p1.ratingAllTime=calc(p1.ratingAllTime,p2.ratingAllTime,a1);
    p2.ratingAllTime=calc(p2.ratingAllTime,p1.ratingAllTime,a2);
    p1.ratingSeason=calc(p1.ratingSeason,p2.ratingSeason,a1);
    p2.ratingSeason=calc(p2.ratingSeason,p1.ratingSeason,a2);
    if(s1===s2){p1.draws++;p2.draws++;}else if(s1>s2){p1.wins++;p2.losses++}else{p2.wins++;p1.losses++;}});
  for(const id in pdata){const p=pdata[id];await db.collection("players").doc(id).update({ratingAllTime:p.ratingAllTime,ratingSeason:p.ratingSeason,wins:p.wins,losses:p.losses,draws:p.draws,badge:updateBadge(p.wins)});}
  alert("All Ratings Recalculated ✅");
}

/* ===== LIVE ADMIN PANEL ===== */
db.collection("matches").orderBy("createdAt","desc").limit(50).onSnapshot(snap=>{
  const list=document.getElementById("list");list.innerHTML="";
  snap.forEach(doc=>{
    const m=doc.data();
    const card=document.createElement("div");card.className="card";
    card.innerHTML=`<b>${m.player1}</b> vs <b>${m.player2}</b><br>Score: ${m.score}<br>Type: ${m.matchType}<br>Status: ${m.status}<br><br>
      ${m.status==="pending"?`<button class="approve" onclick="approveMatch('${doc.id}')">Approve</button><button class="reject" onclick="rejectMatch('${doc.id}')">Reject</button>`:""}
      ${m.status==="approved"?`<button class="rollback" onclick="rollbackMatch('${doc.id}')">Rollback</button>`:""}`;
    list.appendChild(card);
  });
});
</script>
</body>
  </html>
