<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Player Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== SAME UI (unchanged design) ===== */
body{
margin:0;font-family:Arial;
background:radial-gradient(circle at top,#1a2f5c 0%,#0b1c33 40%,#1a0f1f 75%,#000 100%);
color:#fff;
}
.container{max-width:700px;margin:auto;padding:20px;}
header{text-align:center;margin-bottom:20px;}
header img{width:90px;}
.card{
background:linear-gradient(145deg,#0f2545,#081a2e);
padding:20px;border-radius:22px;
box-shadow:0 0 25px rgba(255,215,0,.15),0 0 40px rgba(0,120,255,.15);
}
.name{font-size:22px;font-weight:bold;color:#ffd34d;}
.rank-badge{
display:inline-block;padding:6px 14px;border-radius:25px;
background:linear-gradient(45deg,#ff3b3b,#ffae00);
font-weight:bold;margin-top:6px;
}
.progress{background:#0c223f;border-radius:10px;overflow:hidden;height:10px;margin:12px 0;}
.progress-bar{height:100%;background:linear-gradient(90deg,#4db8ff,#ffd34d);width:0%;transition:.6s;}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:15px;}
.stat{background:#132f55;padding:14px;border-radius:14px;text-align:center;}
.stat h3{margin:5px 0;color:#ffd34d;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:12px;cursor:pointer;font-weight:bold;}
.hidden{display:none;}
.match-card{background:#0f2545;padding:12px;border-radius:12px;margin-bottom:10px;}
.win{border-left:5px solid #4cff8f;}
.loss{border-left:5px solid #ff6b6b;}
.draw{border-left:5px solid #ffd700;}
.rating-plus{color:#4cff8f;font-weight:bold;}
.rating-minus{color:#ff6b6b;font-weight:bold;}
</style>
</head>

<body>
<div class="container">

<div class="card" id="viewBox">
<div class="name" id="v_username">Loading...</div>
<div id="rankBadge" class="rank-badge">Unranked</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>

<div class="stats">
<div class="stat"><div>Rating</div><h3 id="rating">0</h3></div>
<div class="stat"><div>Wins</div><h3 id="wins">0</h3></div>
<div class="stat"><div>Losses</div><h3 id="losses">0</h3></div>
<div class="stat"><div>Win Rate</div><h3 id="winRate">0%</h3></div>
</div>

<button onclick="toggleHistory(true)">Match History</button>
</div>

<div id="matchHistory" class="hidden">
<h3>📜 Match History</h3>
<div id="streakBox"></div>
<canvas id="winChart" height="120"></canvas>
<div id="matchList"></div>
<button onclick="toggleHistory(false)">Close</button>
</div>

</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
authDomain:"afnsclub.firebaseapp.com",
projectId:"afnsclub"
});

const auth=firebase.auth();
const db=firebase.firestore();
let uid, username="";
let chart=null;

auth.onAuthStateChanged(async user=>{
if(!user){location="login.html";return;}
uid=user.uid;

const playerRef=db.collection("players").doc(uid);

playerRef.onSnapshot(doc=>{
if(!doc.exists)return;
const d=doc.data()||{};

username=d.username||user.email.split("@")[0];
v_username.innerText=username;

const ratingVal=d.rating||1000;
const winsVal=d.wins||0;
const lossVal=d.losses||0;
const drawVal=d.draws||0;
const total=winsVal+lossVal+drawVal;
const winPercent=total?Math.round((winsVal/total)*100):0;

animate("rating",ratingVal);
animate("wins",winsVal);
animate("losses",lossVal);
animate("winRate",winPercent,"%");

rankBadge.innerText=
ratingVal>=2000?"👑 Legend":
ratingVal>=1500?"🔥 Elite":
ratingVal>=1000?"⭐ Pro":"🥉 Rising";

progressBar.style.width=Math.min(100,(ratingVal%500)/5)+"%";
});
});

function animate(id,val,suffix=""){
const el=document.getElementById(id);
let start=0;
const duration=500;
let startTime=null;
function step(t){
if(!startTime)startTime=t;
const p=Math.min((t-startTime)/duration,1);
el.innerText=Math.floor(p*val)+suffix;
if(p<1)requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

function toggleHistory(show){
viewBox.classList.toggle("hidden",show);
matchHistory.classList.toggle("hidden",!show);
if(show)loadHistory();
}

async function loadHistory(){
matchList.innerHTML="Loading...";
streakBox.innerHTML="";

const snap=await db.collection("matches")
.where("status","==","approved")
.orderBy("createdAt","desc")
.get();

let matches=snap.docs
.map(d=>d.data())
.filter(m=>m.player1===username||m.player2===username);

if(!matches.length){
matchList.innerHTML="No matches";
return;
}

let streak=0,maxStreak=0;
let winData=[];
matchList.innerHTML="";

matches.forEach(m=>{
let my=0,opp=0;
if(m.score?.includes("-")){
const s=m.score.split("-");
if(m.player1===username){my=parseInt(s[0]);opp=parseInt(s[1]);}
else{my=parseInt(s[1]);opp=parseInt(s[0]);}
}

let result="DRAW",cls="draw";
if(my>opp){result="WIN";cls="win";streak++;maxStreak=Math.max(maxStreak,streak);}
else if(my<opp){result="LOSS";cls="loss";streak=0;}
else{streak=0;}

const opponent=m.player1===username?m.player2:m.player1;
const ratingChange=m.ratingChange?.[username]||0;

matchList.innerHTML+=`
<div class="match-card ${cls}">
<b>${result}</b> vs ${opponent}<br>
Score: ${m.score||"-"}
<div class="${ratingChange>=0?'rating-plus':'rating-minus'}">
Rating ${ratingChange>=0?'+':''}${ratingChange}
</div>
</div>`;

winData.push(cls==="win"?1:0);
});

streakBox.innerHTML="🔥 Max Winning Streak: "+maxStreak;

const ctx=document.getElementById("winChart").getContext("2d");
const labels=winData.map((_,i)=>i+1);
const percentages=winData.map((v,i)=>{
const total=i+1;
const wins=winData.slice(0,i+1).reduce((a,b)=>a+b,0);
return Math.round((wins/total)*100);
});

if(chart)chart.destroy();
chart=new Chart(ctx,{
type:"line",
data:{labels,
datasets:[{
data:percentages,
borderColor:"#4cff8f",
backgroundColor:"rgba(76,255,143,0.2)",
tension:0.3
}]},
options:{
responsive:true,
plugins:{legend:{display:false}},
scales:{y:{min:0,max:100}}
}
});
}
</script>
</body>
  </html>
