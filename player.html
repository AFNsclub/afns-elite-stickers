<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Player Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* আপনার দেওয়া অরিজিনাল থিম এবং সিএসএস হুবহু রাখা হয়েছে */
body{ margin:0; font-family:'Segoe UI', Arial, sans-serif; background:radial-gradient(circle at top,#1a2f5c 0%,#0b1c33 40%,#1a0f1f 75%,#000 100%); color:#fff; min-height: 100vh; }
.container{max-width:700px;margin:auto;padding:20px;}
header{text-align:center;margin-bottom:20px;}
header img{width:90px; filter: drop-shadow(0 0 10px var(--neon));}
.card{ background:linear-gradient(145deg,#0f2545,#081a2e); padding:25px; border-radius:22px; box-shadow:0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
.name{font-size:24px;font-weight:bold;color:#ffd34d; text-transform: uppercase; letter-spacing: 1px;}
.rank-badge{ display:inline-block;padding:6px 16px;border-radius:25px; color:#fff; font-weight:bold; margin-top:8px; font-size: 13px; text-transform: uppercase;}
.progress{background:#0c223f;border-radius:10px;overflow:hidden;height:10px;margin:15px 0; border: 1px solid rgba(255,255,255,0.1);}
.progress-bar{height:100%;background:linear-gradient(90deg,#00f7ff,#ffd700);width:0%;transition:1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:20px;}
.stat{ background:rgba(255,255,255,0.03); padding:15px; border-radius:16px; text-align:center; border: 1px solid rgba(255,255,255,0.05); }
.stat div{ font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 5px;}
.stat h3{margin:0;color:#ffd34d; font-size: 22px;}
button{ width:100%;padding:14px;margin-top:12px;border:none; border-radius:12px;cursor:pointer;font-weight:bold; background:linear-gradient(45deg,#1e5eff,#00c6ff); color:#fff; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;}
button:hover{ transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4); }
.secondary{ background: #1a2a3a !important; }
.hidden{display:none;}
input{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid rgba(0,247,255,0.2); background:#050d1a; color:#fff; outline: none;}
input:focus{ border-color: #00f7ff; }
.match-card{ background:rgba(255,255,255,0.03); padding:15px; border-radius:14px; margin-bottom:12px; border-left:5px solid #ffd700; transition: 0.3s; }
.win{border-left-color:#4cff8f; background: rgba(76, 255, 143, 0.05);} 
.loss{border-left-color:#ff6b6b; background: rgba(255, 107, 107, 0.05);} 
.draw{border-left-color:#ffd700; background: rgba(255, 215, 0, 0.05);}
.info-line{ font-size: 14px; margin: 8px 0; color: #ccc; }
#winChart{margin-top:20px;background:rgba(0,0,0,0.2);padding:15px;border-radius:16px; border: 1px solid rgba(255,255,255,0.05);}
</style>
</head>

<body>
<div class="container">
<header>
  <img src="logo.png" alt="AFNS Logo">
  <h2>Player Profile</h2>
</header>

<div class="card" id="viewBox">
  <div class="name" id="v_username">Loading...</div>
  <div class="info-line" id="v_email" style="opacity: 0.6; font-size: 13px;">—</div>
  <div id="rankBadge" class="rank-badge">Unranked</div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

  <div class="info-line">🌐 FB: <span id="fbLink" class="hidden" onclick="openFb()" style="color:#00f7ff; cursor:pointer; font-weight: bold;">[View Profile]</span><span id="fbNone">Not Set</span></div>
  <div class="info-line">📱 Phone: <span id="v_phone" style="color: #fff;">—</span></div>
  <div class="info-line">👑 Owner ID: <span id="v_ownerId" style="color: #fff;">—</span></div>
  <div class="info-line">💻 Device: <span id="v_device" style="color: #fff;">—</span></div>

  <div class="stats">
    <div class="stat"><div>Rating Points</div><h3 id="rating">1000</h3></div>
    <div class="stat"><div>Win Rate</div><h3 id="winRate">0%</h3></div>
    <div class="stat"><div>Total Wins</div><h3 id="wins">0</h3></div>
    <div class="stat"><div>Matches</div><h3 id="played">0</h3></div>
  </div>

  <button onclick="location.href='index.html'">Submit New Match</button>
  <button class="secondary" onclick="toggleHistory(true)">📜 Match History</button>
  <button class="secondary" onclick="toggleEdit(true)">⚙️ Edit Profile</button>
  <button onclick="logout()" style="background:linear-gradient(45deg,#ff4b2b, #ff416c); margin-top: 20px;">Logout</button>
</div>

<div id="editBox" class="hidden card">
  <h3 style="color:#ffd34d; text-align: center;">Update Details</h3>
  <label style="font-size: 11px; color: #aaa;">MOBILE NUMBER</label>
  <input id="phone" placeholder="e.g. 017xxxxxxxx">
  <label style="font-size: 11px; color: #aaa;">IN-GAME OWNER ID</label>
  <input id="ownerId" placeholder="e.g. 123-456-789">
  <label style="font-size: 11px; color: #aaa;">FACEBOOK PROFILE LINK</label>
  <input id="facebook" placeholder="https://facebook.com/yourid">
  <label style="font-size: 11px; color: #aaa;">DEVICE NAME</label>
  <input id="deviceName" placeholder="e.g. Xiaomi Note 10 Pro">
  
  <button onclick="saveProfile()">Save Changes</button>
  <button class="secondary" onclick="toggleEdit(false)">Cancel</button>
</div>

<div class="match-history hidden card" id="matchHistory">
  <h3 style="color:#ffd34d; text-align: center;">📜 Recent Performance</h3>
  <canvas id="winChart" height="150"></canvas>
  <div id="matchList" style="margin-top: 20px;"></div>
  <button class="secondary" onclick="toggleHistory(false)">Back to Profile</button>
</div>

</div>

<script>
// Firebase Config
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});

const auth=firebase.auth();
const db=firebase.firestore();
let uid, currentUserData={}, chart=null;

auth.onAuthStateChanged(async user=>{
  if(!user){location="login.html";return;}
  uid=user.uid;
  document.getElementById("v_email").innerText=user.email;

  // রিয়েলটাইম প্রোফাইল ডাটা লোড
  db.collection("players").doc(uid).onSnapshot(doc=>{
    if(!doc.exists) return;
    const d=doc.data();
    currentUserData = d;
    
    document.getElementById("v_username").innerText = d.username || "Striker";
    document.getElementById("v_phone").innerText = d.phone || "Not Set";
    document.getElementById("v_ownerId").innerText = d.ownerId || d.gameId || "Not Set";
    document.getElementById("v_device").innerText = d.deviceName || d.device || "Not Set";
    
    if(d.facebook) {
        document.getElementById("fbLink").classList.remove("hidden");
        document.getElementById("fbNone").classList.add("hidden");
    }

    // স্ট্যাটস
    const rating = d.ratingAllTime || 1000;
    const wins = d.wins || 0;
    const total = d.matchesPlayed || (wins + (d.losses||0) + (d.draws||0));
    
    document.getElementById("rating").innerText = rating;
    document.getElementById("played").innerText = total;
    document.getElementById("wins").innerText = wins;
    
    const winRate = total ? Math.round((wins/total)*100) : 0;
    document.getElementById("winRate").innerText = winRate + "%";

    // র‍্যাঙ্ক সিস্টেম
    updateRankUI(rating);
  });
});

function updateRankUI(rating) {
    const badge = document.getElementById("rankBadge");
    const bar = document.getElementById("progressBar");
    
    if(rating >= 2200) { badge.innerText="👑 Legend"; badge.style.background="linear-gradient(45deg,#ffd700,#ff8c00)"; }
    else if(rating >= 1800) { badge.innerText="🔥 Elite Striker"; badge.style.background="linear-gradient(45deg,#ff4b2b,#ff416c)"; }
    else if(rating >= 1400) { badge.innerText="🎖️ Diamond"; badge.style.background="linear-gradient(45deg,#00b4db,#0083b0)"; }
    else { badge.innerText="🛡️ Rookie"; badge.style.background="linear-gradient(45deg,#555,#222)"; }
    
    // বার ক্যালকুলেশন (Max 2500 ধরে)
    bar.style.width = Math.min(100, (rating/2500)*100) + "%";
}

async function loadMatchHistory(){
  const list = document.getElementById("matchList");
  list.innerHTML = "<div style='text-align:center;'>Loading History...</div>";
  
  const snap = await db.collection("matches")
    .where("status","==","approved")
    .orderBy("createdAt","desc")
    .limit(10)
    .get();

  list.innerHTML = "";
  let performanceData = [];

  snap.forEach(doc => {
    const m = doc.data();
    if(m.players && m.players.includes(currentUserData.username)){
        const score = m.score.split("-").map(s => parseInt(s.trim()));
        const isHome = m.players.indexOf(currentUserData.username) < (m.players.length / 2);
        
        let result = "DRAW", cls = "draw", point = 0.5;
        
        if(score[0] > score[1]) {
            result = isHome ? "WIN" : "LOSS";
            cls = isHome ? "win" : "loss";
            point = isHome ? 1 : 0;
        } else if(score[1] > score[0]) {
            result = isHome ? "LOSS" : "WIN";
            cls = isHome ? "loss" : "win";
            point = isHome ? 0 : 1;
        }

        performanceData.push(point);

        list.innerHTML += `
          <div class="match-card ${cls}">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="color:${result==='WIN'?'#4cff8f':result==='LOSS'?'#ff6b6b':'#ffd700'}">${result}</b>
                <span style="font-size:10px; opacity:0.5;">${m.createdAt?.toDate().toLocaleDateString() || 'Recent'}</span>
            </div>
            <div style="margin-top:5px; font-size:13px;">
                ${m.hTeamName || m.players[0]} <span style="color:#ffd700; font-weight:bold;">${m.score}</span> ${m.aTeamName || m.players[m.players.length-1]}
            </div>
          </div>
        `;
    }
  });

  if(list.innerHTML === "") list.innerHTML = "<div style='text-align:center; opacity:0.5;'>No matches found!</div>";
  updateChart(performanceData.reverse());
}

function updateChart(data){
    const ctx = document.getElementById('winChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map((_,i)=> i+1),
            datasets: [{
                label: 'Performance',
                data: data,
                borderColor: '#00f7ff',
                backgroundColor: 'rgba(0, 247, 255, 0.1)',
                borderWidth: 3,
                tension: 0.4,
                fill: true,
                pointRadius: 4,
                pointBackgroundColor: '#00f7ff'
            }]
        },
        options: { 
            plugins: { legend: { display: false } }, 
            scales: { 
                y: { min: 0, max: 1, ticks: { display: false }, grid: { display: false } },
                x: { grid: { color: 'rgba(255,255,255,0.05)' } }
            } 
        }
    });
}

function toggleHistory(show){
    document.getElementById("matchHistory").classList.toggle("hidden", !show);
    document.getElementById("viewBox").classList.toggle("hidden", show);
    if(show) loadMatchHistory();
}

function toggleEdit(show){
    document.getElementById("editBox").classList.toggle("hidden", !show);
    document.getElementById("viewBox").classList.toggle("hidden", show);
    if(show){
        document.getElementById("phone").value = currentUserData.phone || "";
        document.getElementById("ownerId").value = currentUserData.ownerId || currentUserData.gameId || "";
        document.getElementById("facebook").value = currentUserData.facebook || "";
        document.getElementById("deviceName").value = currentUserData.deviceName || currentUserData.device || "";
    }
}

async function saveProfile(){
    try {
        await db.collection("players").doc(uid).update({
            phone: document.getElementById("phone").value,
            ownerId: document.getElementById("ownerId").value,
            facebook: document.getElementById("facebook").value,
            deviceName: document.getElementById("deviceName").value
        });
        alert("✅ Profile Updated Successfully!");
        toggleEdit(false);
    } catch(e) {
        alert("❌ Error: " + e.message);
    }
}

function logout(){ if(confirm("Logout now?")) auth.signOut().then(()=> location="login.html"); }
function openFb(){ if(currentUserData.facebook) window.open(currentUserData.facebook, "_blank"); }
</script>
</body>
</html>
