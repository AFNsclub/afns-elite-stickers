<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Player Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* আপনার দেওয়া অরিজিনাল থিম এবং সিএসএস হুবহু রাখা হয়েছে */
body{ margin:0; font-family:Arial; background:radial-gradient(circle at top,#1a2f5c 0%,#0b1c33 40%,#1a0f1f 75%,#000 100%); color:#fff; }
.container{max-width:700px;margin:auto;padding:20px;}
header{text-align:center;margin-bottom:20px;}
header img{width:90px;}
.card{ background:linear-gradient(145deg,#0f2545,#081a2e); padding:20px; border-radius:22px; box-shadow:0 0 25px rgba(255,215,0,.15); transition: transform 0.3s ease; }
.name{font-size:22px;font-weight:bold;color:#ffd34d;}
.rank-badge{ display:inline-block;padding:6px 14px;border-radius:25px; background:linear-gradient(45deg,#ff3b3b,#ffae00); color:#fff; font-weight:bold; margin-top:6px; }
.progress{background:#0c223f;border-radius:10px;overflow:hidden;height:10px;margin:12px 0;}
.progress-bar{height:100%;background:linear-gradient(90deg,#4db8ff,#ffd34d);width:0%;transition:.7s ease;}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:15px;}
.stat{ background:linear-gradient(145deg,#132f55,#0d203a); padding:14px; border-radius:14px; text-align:center; }
.stat h3{margin:5px 0;color:#ffd34d;}
button{ width:100%;padding:12px;margin-top:10px;border:none; border-radius:12px;cursor:pointer;font-weight:bold; background:linear-gradient(45deg,#1e5eff,#00c6ff); color:#fff; }
.hidden{display:none;}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none; background:#0d1929; color:#fff;}
.match-card{ background:linear-gradient(145deg,#0f2545,#081a2e); padding:12px; border-radius:12px; margin-bottom:10px; border-left:5px solid #ffd700; animation: fadeUp 0.5s forwards; }
@keyframes fadeUp{ to{transform: translateY(0); opacity:1;} }
.win{border-left-color:#4cff8f;} .loss{border-left-color:#ff6b6b;} .draw{border-left-color:#ffd700;}
.rating-plus{color:#4cff8f; font-weight:bold;} .rating-minus{color:#ff6b6b; font-weight:bold;}
#winChart{margin-top:20px;background:#081a2e;padding:10px;border-radius:12px;}
</style>
</head>

<body>
<div class="container">
<header>
  <img src="logo.png" alt="AFNS Logo">
  <h2>AFNS Elite Player Profile</h2>
</header>

<div class="card" id="viewBox">
  <div class="name" id="v_username">Loading...</div>
  <div class="email" id="v_email">—</div>
  <div id="rankBadge" class="rank-badge">Unranked</div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

  <div class="info-line">🌐 Facebook: <span id="fbLink" class="fb-link hidden" onclick="openFb()" style="color:#4db8ff; cursor:pointer;">View Profile</span></div>
  <div class="info-line">📱 Phone: <span id="v_phone">—</span></div>
  <div class="info-line">👑 Owner ID: <span id="v_ownerId">—</span></div>
  <div class="info-line">💻 Device: <span id="v_device">—</span></div>

  <div class="stats">
    <div class="stat"><div>Rating</div><h3 id="rating">1000</h3></div>
    <div class="stat"><div>Played</div><h3 id="played">0</h3></div>
    <div class="stat"><div>Wins</div><h3 id="wins">0</h3></div>
    <div class="stat"><div>Win Rate</div><h3 id="winRate">0%</h3></div>
  </div>

  <button onclick="location.href='index.html'">Submit Match</button>
  <button onclick="toggleHistory(true)">Match History</button>
  <button onclick="toggleEdit(true)">Edit Profile</button>
  <button class="secondary" onclick="logout()" style="background:#333;">Logout</button>
</div>

<div id="editBox" class="hidden card">
  <h3 style="color:var(--gold)">Edit Profile</h3>
  <input id="phone" placeholder="Phone Number">
  <input id="ownerId" placeholder="In-Game Owner ID">
  <input id="facebook" placeholder="Facebook Profile Link">
  <input id="deviceName" placeholder="Device Name (e.g. iPhone 13)">
  <button onclick="saveProfile()">Save Changes</button>
  <button class="secondary" onclick="toggleEdit(false)" style="background:#333;">Cancel</button>
</div>

<div class="match-history hidden" id="matchHistory">
  <h3 style="color:var(--gold)">📜 Match History</h3>
  <div class="streak-box" id="streakBox" style="color:#4cff8f; margin-bottom:10px; font-weight:bold;"></div>
  <canvas id="winChart" height="150"></canvas>
  <div id="matchList"></div>
  <button onclick="toggleHistory(false)" style="background:#333;">Back to Profile</button>
</div>

</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});

const auth=firebase.auth();
const db=firebase.firestore();
let uid, currentUserData={}, chart=null;

auth.onAuthStateChanged(async user=>{
  if(!user){location="login.html";return;}
  uid=user.uid;
  document.getElementById("v_email").innerText=user.email;

  // রিয়েলটাইম প্রোফাইল ডাটা লোড
  db.collection("players").doc(uid).onSnapshot(doc=>{
    if(!doc.exists) return;
    const d=doc.data();
    currentUserData = d;
    
    document.getElementById("v_username").innerText = d.username || "Striker";
    document.getElementById("v_phone").innerText = d.phone || "Not Set";
    document.getElementById("v_ownerId").innerText = d.ownerId || "Not Set";
    document.getElementById("v_device").innerText = d.deviceName || "Not Set";
    
    if(d.facebook) document.getElementById("fbLink").classList.remove("hidden");

    // স্ট্যাটস আপডেট
    const rating = d.ratingAllTime || 1000;
    document.getElementById("rating").innerText = rating;
    document.getElementById("played").innerText = d.matchesPlayed || 0;
    document.getElementById("wins").innerText = d.wins || 0;
    
    const winRate = d.matchesPlayed ? Math.round(((d.wins||0)/d.matchesPlayed)*100) : 0;
    document.getElementById("winRate").innerText = winRate + "%";

    // র‍্যাঙ্ক ব্যাজ লজিক
    const badge = document.getElementById("rankBadge");
    if(rating >= 2000) { badge.innerText="👑 Legend"; badge.style.background="linear-gradient(45deg,#ffd700,#ff8c00)"; }
    else if(rating >= 1500) { badge.innerText="🔥 Elite"; badge.style.background="linear-gradient(45deg,#ff4b2b,#ff416c)"; }
    else { badge.innerText="⭐ Pro Striker"; badge.style.background="linear-gradient(45deg,#00b4db,#0083b0)"; }

    document.getElementById("progressBar").style.width = Math.min(100, (rating/25)) + "%";
  });
});

async function loadMatchHistory(){
  const list = document.getElementById("matchList");
  list.innerHTML = "Loading History...";
  
  // নতুন সিস্টেম অনুযায়ী ম্যাচ ফিল্টার (যেখানে এই প্লেয়ারটি খেলেছে)
  const snap = await db.collection("matches")
    .where("status","==","approved")
    .orderBy("createdAt","desc").get();

  list.innerHTML = "";
  let winCount = 0, totalForChart = [];

  snap.forEach(doc => {
    const m = doc.data();
    // চেক করা হচ্ছে প্লেয়ারটি এই ম্যাচে ছিল কি না
    if(m.players && m.players.includes(currentUserData.username)){
        const score = m.score.split("-").map(Number);
        const isHome = m.players[0] === currentUserData.username;
        
        let result = "DRAW", cls = "draw";
        if(score[0] > score[1]) {
            result = isHome ? "WIN" : "LOSS";
            cls = isHome ? "win" : "loss";
        } else if(score[1] > score[0]) {
            result = isHome ? "LOSS" : "WIN";
            cls = isHome ? "loss" : "win";
        }

        if(result === "WIN") winCount++;
        totalForChart.push(result === "WIN" ? 1 : 0);

        list.innerHTML += `
          <div class="match-card ${cls}">
            <b style="color:var(--gold)">${result}</b> | ${m.tName}<br>
            <span>${m.hTeamName || m.players[0]} ${m.score} ${m.aTeamName || m.players[1]}</span>
            <div class="small" style="font-size:11px; opacity:0.6; margin-top:5px;">${m.createdAt?.toDate().toLocaleDateString()}</div>
          </div>
        `;
    }
  });

  if(list.innerHTML === "") list.innerHTML = "<div class='empty'>No matches found!</div>";
  updateChart(totalForChart.reverse());
}

function updateChart(data){
    const ctx = document.getElementById('winChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map((_,i)=> i+1),
            datasets: [{
                label: 'Performance',
                data: data,
                borderColor: '#00f7ff',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(0, 247, 255, 0.1)'
            }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { display: false } } }
    });
}

function toggleHistory(show){
    document.getElementById("matchHistory").classList.toggle("hidden", !show);
    document.getElementById("viewBox").classList.toggle("hidden", show);
    if(show) loadMatchHistory();
}

function toggleEdit(show){
    document.getElementById("editBox").classList.toggle("hidden", !show);
    document.getElementById("viewBox").classList.toggle("hidden", show);
    if(show){
        document.getElementById("phone").value = currentUserData.phone || "";
        document.getElementById("ownerId").value = currentUserData.ownerId || "";
        document.getElementById("facebook").value = currentUserData.facebook || "";
        document.getElementById("deviceName").value = currentUserData.deviceName || "";
    }
}

async function saveProfile(){
    await db.collection("players").doc(uid).update({
        phone: document.getElementById("phone").value,
        ownerId: document.getElementById("ownerId").value,
        facebook: document.getElementById("facebook").value,
        deviceName: document.getElementById("deviceName").value
    });
    alert("Profile Updated!");
    toggleEdit(false);
}

function logout(){ auth.signOut().then(()=> location="login.html"); }
function openFb(){ if(currentUserData.facebook) window.open(currentUserData.facebook, "_blank"); }
</script>
</body>
</html>
