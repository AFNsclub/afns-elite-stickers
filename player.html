<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Player Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Chart.js for Win% Graph -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#1a2f5c 0%,#0b1c33 40%,#1a0f1f 75%,#000 100%);
  color:#fff;
}
.container{max-width:700px;margin:auto;padding:20px;}
header{text-align:center;margin-bottom:20px;}
header img{width:90px;}
.card{
  background:linear-gradient(145deg,#0f2545,#081a2e);
  padding:20px;border-radius:22px;
  box-shadow:0 0 25px rgba(255,215,0,.15),0 0 40px rgba(0,120,255,.15);
  transition: transform 0.3s ease;
}
.card:hover{transform: translateY(-4px);}
.name{font-size:22px;font-weight:bold;color:#ffd34d;transition: all 0.5s ease;}
.email{opacity:.85;margin-bottom:8px;}
.rank-badge{
  display:inline-block;padding:6px 14px;border-radius:25px;
  background:linear-gradient(45deg,#ff3b3b,#ffae00);
  color:#fff;font-weight:bold;margin-top:6px;
  transition: all 0.5s ease;
}
.progress{background:#0c223f;border-radius:10px;overflow:hidden;height:10px;margin:12px 0;}
.progress-bar{height:100%;background:linear-gradient(90deg,#4db8ff,#ffd34d);width:0%;transition:.7s ease;}
.info-line{margin:8px 0;font-size:14px;}
.info-line span{color:#4db8ff;}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:15px;}
.stat{
  background:linear-gradient(145deg,#132f55,#0d203a);
  padding:14px;border-radius:14px;text-align:center;
  transition: all 0.5s ease;
}
.stat h3{margin:5px 0;color:#ffd34d;transition: all 0.5s ease;}
button{
  width:100%;padding:12px;margin-top:10px;border:none;
  border-radius:12px;cursor:pointer;font-weight:bold;
  background:linear-gradient(45deg,#1e5eff,#00c6ff);
  color:#fff;
  transition: transform 0.2s ease, background 0.3s ease;
}
button:hover{transform: scale(1.05);}
button.secondary{background:#1a1a1a;color:#ccc;}
.home-btn{background:linear-gradient(45deg,#ff9800,#ff3d00);}
.hidden{display:none;}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;}
.success{color:#00ff88;margin-top:10px;}
.fb-link{color:#4db8ff;text-decoration:underline;cursor:pointer;}
.match-card{
  background:linear-gradient(145deg,#0f2545,#081a2e);
  padding:12px;border-radius:12px;margin-bottom:10px;
  box-shadow:0 0 12px rgba(0,0,0,.5);
  transform: translateY(20px);
  opacity: 0;
  animation: fadeUp 0.5s forwards;
}
@keyframes fadeUp{
  to{transform: translateY(0); opacity:1;}
}
.win{border-left:5px solid #4cff8f;}
.loss{border-left:5px solid #ff6b6b;}
.draw{border-left:5px solid #ffd700;}
.small{font-size:12px;color:#aaa;margin-top:4px;}
.empty{text-align:center;opacity:.6;margin-top:20px;}
.filter-btns button{
  width:auto;
  padding:6px 14px;
  margin:4px;
  border-radius:20px;
  font-size:13px;
}
.active-filter{background:#ffd700 !important;color:#000 !important;}
.streak-box{margin-bottom:10px;font-weight:bold;color:#4cff8f;}
.rating-plus{color:#4cff8f;font-weight:bold;}
.rating-minus{color:#ff6b6b;font-weight:bold;}
#winChart{margin-top:20px;background:#081a2e;padding:10px;border-radius:12px;}
</style>
</head>

<body>
<div class="container">
<header>
  <img src="logo.png" alt="AFNS Logo">
  <h2>AFNS Elite Player Profile</h2>
</header>

<div class="card" id="viewBox">
  <div class="name" id="v_username">Loading...</div>
  <div class="email" id="v_email">—</div>
  <div id="rankBadge" class="rank-badge">Unranked</div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

  <div class="info-line">🌐 Facebook:
    <span id="fbLink" class="fb-link hidden" onclick="openFb()">View Profile</span>
  </div>
  <div class="info-line">📱 Phone: <span id="v_phone">—</span></div>
  <div class="info-line">👑 Owner ID: <span id="v_ownerId">—</span></div>
  <div class="info-line">💻 Device: <span id="v_device">—</span></div>

  <div class="stats">
    <div class="stat"><div>Rating</div><h3 id="rating">0</h3></div>
    <div class="stat"><div>Wins</div><h3 id="wins">0</h3></div>
    <div class="stat"><div>Losses</div><h3 id="losses">0</h3></div>
    <div class="stat"><div>Win Rate</div><h3 id="winRate">0%</h3></div>
  </div>

  <button onclick="location.href='player-submit-match.html'">Submit Match</button>
  <button onclick="toggleHistory(true)">Match History</button>
  <button onclick="toggleEdit(true)">Edit Profile</button>
  <button class="secondary" onclick="logout()">Logout</button>
  <button class="home-btn" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div id="editBox" class="hidden">
  <input id="phone" placeholder="Phone">
  <input id="ownerId" placeholder="Owner ID">
  <input id="facebook" placeholder="Facebook link">
  <input id="deviceName" placeholder="Device name">
  <button onclick="saveProfile()">Save</button>
  <button class="secondary" onclick="toggleEdit(false)">Cancel</button>
</div>

<div class="match-history hidden" id="matchHistory">
<h3>📜 Match History</h3>

<div>
<button onclick="setSeason('all')">All Season</button>
<button onclick="setSeason('S1')">Season 1</button>
<button onclick="setSeason('S2')">Season 2</button>
</div>

<div class="filter-btns">
<button onclick="setFilter('all')" id="f_all">All</button>
<button onclick="setFilter('win')" id="f_win">Win</button>
<button onclick="setFilter('draw')" id="f_draw">Draw</button>
<button onclick="setFilter('loss')" id="f_loss">Loss</button>
</div>

<div class="streak-box" id="streakBox"></div>
<canvas id="winChart" height="120"></canvas>
<div id="matchList"></div>
<button class="secondary" onclick="toggleHistory(false)">Close History</button>
</div>

<div id="msg"></div>
</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
authDomain:"afnsclub.firebaseapp.com",
projectId:"afnsclub"
});

const auth=firebase.auth();
const db=firebase.firestore();

let uid,username="",fbUrl="";
let currentFilter="all",currentSeason="all";
let chart=null;

auth.onAuthStateChanged(async user=>{
if(!user){location="login.html";return;}
uid=user.uid;

const docRef=db.collection("players").doc(uid);
const snap=await docRef.get();
username=snap.data()?.username||"";
document.getElementById("v_email").innerText=user.email;

docRef.onSnapshot(doc=>{
const d=doc.data()||{};

const ratingVal=Number(d.ratingAllTime)||1000;
const winsVal=Number(d.wins)||0;
const lossVal=Number(d.losses)||0;
const drawVal=Number(d.draws)||0;
const total=winsVal+lossVal+drawVal;
const winPercent=total?Math.round((winsVal/total)*100):0;

animateValue("rating",Number(rating.innerText)||0,ratingVal,500);
animateValue("wins",Number(wins.innerText)||0,winsVal,500);
animateValue("losses",Number(losses.innerText)||0,lossVal,500);
animateValue("winRate",Number(winRate.innerText.replace("%",""))||0,winPercent,500,"%");

v_username.innerText=d.username||"—";
v_phone.innerText=d.phone||"—";
v_ownerId.innerText=d.ownerId||"—";
v_device.innerText=d.deviceName||"—";

fbUrl=d.facebook||"";
fbLink.classList.toggle("hidden",!fbUrl);

rankBadge.innerText=
ratingVal>=2000?"👑 Legend":
ratingVal>=1500?"🔥 Elite":
ratingVal>=1000?"⭐ Pro":"🥉 Rising";

progressBar.style.width=Math.min(100,(ratingVal%500)/5)+"%";
});
});

function animateValue(id,start,end,duration,suffix=""){
const obj=document.getElementById(id);
let startTime=null;
function step(timestamp){
if(!startTime)startTime=timestamp;
const progress=Math.min((timestamp-startTime)/duration,1);
obj.innerText=Math.floor(start+(end-start)*progress)+suffix;
if(progress<1)requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

function toggleHistory(show){
matchHistory.classList.toggle("hidden",!show);
viewBox.classList.toggle("hidden",show);
if(show)loadMatchHistory();
}

function setFilter(type){
currentFilter=type;
document.querySelectorAll(".filter-btns button")
.forEach(b=>b.classList.remove("active-filter"));
document.getElementById("f_"+type).classList.add("active-filter");
loadMatchHistory();
}

function setSeason(season){
currentSeason=season;
loadMatchHistory();
}

async function loadMatchHistory(){
matchList.innerHTML="Loading...";
streakBox.innerHTML="";

const snap1=await db.collection("matches")
.where("player1Id","==",uid)
.where("status","==","approved").get();

const snap2=await db.collection("matches")
.where("player2Id","==",uid)
.where("status","==","approved").get();

const map=new Map();
[...snap1.docs,...snap2.docs].forEach(d=>{
map.set(d.id,d.data());
});

let all=[...map.values()]
.sort((a,b)=>{
const t1=a.createdAt?.seconds||0;
const t2=b.createdAt?.seconds||0;
return t2-t1;
});

if(!all.length){
matchList.innerHTML="<div class='empty'>No matches</div>";
return;
}

let streak=0,maxStreak=0;
let winData=[];
matchList.innerHTML="";

all.forEach(m=>{

if(currentSeason!=="all" && m.seasonId!==currentSeason) return;

const isPlayer1 = m.player1Id===uid;
const opponent = isPlayer1 ? m.player2 : m.player1;

let my=0,opp=0;
if(m.score?.includes("-")){
const s=m.score.split("-");
if(isPlayer1){
my=parseInt(s[0])||0;
opp=parseInt(s[1])||0;
}else{
my=parseInt(s[1])||0;
opp=parseInt(s[0])||0;
}
}

let result="DRAW",cls="draw";
if(my>opp){result="WIN";cls="win";streak++;maxStreak=Math.max(maxStreak,streak);}
else if(my<opp){result="LOSS";cls="loss";streak=0;}
else{streak=0;}

if(currentFilter!=="all" && currentFilter!==cls) return;

/* rating change calculation */
let ratingBefore = isPlayer1 ? m.ratingBefore1 : m.ratingBefore2;
let ratingAfter  = isPlayer1 ? m.ratingAfter1  : m.ratingAfter2;
let ratingChange = (ratingAfter||0)-(ratingBefore||0);

matchList.innerHTML+=`
<div class="match-card ${cls}">
<b>${result}</b> vs ${opponent}<br>
Score: ${m.score||"-"}
<div class="${ratingChange>=0?'rating-plus':'rating-minus'}">
Rating ${ratingChange>=0?'+':''}${ratingChange}
</div>
<div class="small">${m.createdAt?.toDate()?.toLocaleString()||""}</div>
</div>`;

winData.push(cls==="win"?1:0);
});

streakBox.innerHTML="🔥 Winning Streak: "+maxStreak;

const ctx=document.getElementById('winChart').getContext('2d');

const labels=winData.map((_,i)=>i+1);
const percentages=winData.map((v,i)=>{
const total=i+1;
const wins=winData.slice(0,i+1).reduce((a,b)=>a+b,0);
return Math.round((wins/total)*100);
});

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'line',
data:{
labels,
datasets:[{
data:percentages,
borderColor:'#4cff8f',
backgroundColor:'rgba(76,255,143,0.2)',
tension:0.3
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}},
scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}
}
});
}

function logout(){auth.signOut().then(()=>location="login.html");}
function openFb(){if(fbUrl)window.open(fbUrl,"_blank");}
function toggleEdit(edit){
viewBox.classList.toggle("hidden",edit);
editBox.classList.toggle("hidden",!edit);
}
function saveProfile(){
db.collection("players").doc(uid).update({
phone:phone.value.trim(),
ownerId:ownerId.value.trim(),
facebook:facebook.value.trim(),
deviceName:deviceName.value.trim()
}).then(()=>toggleEdit(false));
}
</script>
</body>
</html>
