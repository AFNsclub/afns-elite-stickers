<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Player Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1c33;color:#fff}
.container{max-width:700px;margin:auto;padding:20px;}
.card{background:#0f2545;padding:20px;border-radius:20px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:15px;}
.stat{background:#132f55;padding:14px;border-radius:12px;text-align:center}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:12px;font-weight:bold;cursor:pointer}
.secondary{background:#222;color:#ccc}
.match-card{background:#081a2e;padding:12px;border-radius:12px;margin-bottom:10px}
.win{border-left:5px solid #4cff8f}
.loss{border-left:5px solid #ff6b6b}
.draw{border-left:5px solid #ffd700}
.hidden{display:none}
</style>
</head>
<body>

<div class="container">

<div class="card" id="viewBox">
<h2 id="username">Loading...</h2>
<div id="badge">—</div>

<div class="stats">
<div class="stat"><div>All Time</div><h3 id="ratingAll">1000</h3></div>
<div class="stat"><div>Season</div><h3 id="ratingSeason">1000</h3></div>
<div class="stat"><div>Wins</div><h3 id="wins">0</h3></div>
<div class="stat"><div>Win Rate</div><h3 id="winRate">0%</h3></div>
</div>

<button onclick="toggleHistory(true)">Match History</button>
<button onclick="logout()">Logout</button>
</div>

<div id="historyBox" class="hidden">
<h3>📜 Match History</h3>
<div id="matchList"></div>
<button class="secondary" onclick="toggleHistory(false)">Close</button>
</div>

</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
authDomain:"afnsclub.firebaseapp.com",
projectId:"afnsclub"
});

const auth=firebase.auth();
const db=firebase.firestore();
let uid;

/* ===== AUTH ===== */
auth.onAuthStateChanged(async user=>{
if(!user){location="login.html";return;}
uid=user.uid;

db.collection("players").doc(uid)
.onSnapshot(doc=>{
if(!doc.exists) return;
const d=doc.data();

document.getElementById("username").innerText=d.username;
document.getElementById("badge").innerText=d.badge||"🛡 Rookie";

const all=d.ratingAllTime||1000;
const season=d.ratingSeason||1000;
const wins=d.wins||0;
const losses=d.losses||0;
const draws=d.draws||0;

document.getElementById("ratingAll").innerText=all;
document.getElementById("ratingSeason").innerText=season;
document.getElementById("wins").innerText=wins;

const total=wins+losses+draws;
document.getElementById("winRate").innerText=
total?Math.round((wins/total)*100)+"%":"0%";
});
});

/* ===== MATCH HISTORY (FAST) ===== */
function toggleHistory(show){
document.getElementById("historyBox").classList.toggle("hidden",!show);
document.getElementById("viewBox").classList.toggle("hidden",show);
if(show) loadHistory();
}

async function loadHistory(){
const list=document.getElementById("matchList");
list.innerHTML="Loading...";

const snap=await db.collection("matches")
.where("status","==","approved")
.where("player1Id","in",[uid])
.get();

const snap2=await db.collection("matches")
.where("status","==","approved")
.where("player2Id","in",[uid])
.get();

const all=[...snap.docs,...snap2.docs]
.sort((a,b)=>{
const at=a.data().createdAt?.toDate()?.getTime()||0;
const bt=b.data().createdAt?.toDate()?.getTime()||0;
return bt-at;
});

if(all.length===0){list.innerHTML="No matches yet";return;}

list.innerHTML="";
all.forEach(d=>{
const m=d.data();
const opponent=m.player1Id===uid?m.player2:m.player1;

let cls="draw";
if(m.winner===m.player1 && m.player1Id===uid) cls="win";
else if(m.winner===m.player2 && m.player2Id===uid) cls="win";
else if(m.winner && m.winner!==opponent) cls="loss";

list.innerHTML+=`
<div class="match-card ${cls}">
<b>${m.score}</b> vs ${opponent}<br>
<small>${m.matchType||"friendly"}</small>
</div>`;
});
}

/* ===== LOGOUT ===== */
function logout(){
auth.signOut().then(()=>location="login.html");
}
</script>

</body>
</html>
