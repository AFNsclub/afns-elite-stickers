<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Strikers | Player Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --gold:#FFD700;
  --neon:#00f7ff;
  --bg1:#010814;
  --bg2:#021b33;
  --card:rgba(0,0,0,.65);
  --win:#4cff8f;
  --lose:#ff4c4c;
  --draw:#ffd166;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
  min-height:100vh;
  background:radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px;
}
.container{
  max-width:600px;
  width:100%;
  background:var(--card);
  border-radius:20px;
  padding:25px 30px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 40px rgba(0,247,255,.35),0 0 20px rgba(255,215,0,.25);
  animation:fadeIn 0.8s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
header{text-align:center;margin-bottom:20px;}
header img{width:100px; filter:drop-shadow(0 0 20px var(--gold));}
h1{margin:10px 0;color:var(--gold); text-shadow:0 0 15px var(--gold);}
.rank-badge{
  display:inline-block;
  margin-top:10px;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(27,20,0,.7);
  color:var(--gold);
  font-weight:700;
  box-shadow:0 0 10px var(--neon);
}
.card{margin-top:20px;background:rgba(255,255,255,.05);padding:20px;border-radius:20px;}
.row{margin-bottom:14px;}
.label{font-size:12px;color:#aaa;}
.value{font-size:15px;font-weight:700;}
.stats{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.stat-box{
  background:rgba(0,0,0,.4);
  padding:12px;
  border-radius:14px;
  text-align:center;
  transition:.3s;
}
.stat-box:hover{
  transform:scale(1.05);
  box-shadow:0 0 12px var(--neon);
}
.stat-title{font-size:12px;color:#aaa;}
.stat-value{font-size:18px;font-weight:700;margin-top:4px;}
.chart-container{
  margin-top:30px;
  background:rgba(0,0,0,.3);
  padding:15px;
  border-radius:20px;
}
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.2);
}
th{color:var(--gold);}
tr:nth-child(even){background:rgba(255,255,255,.05);}
.result-badge{
  padding:4px 10px;
  border-radius:12px;
  font-weight:700;
  color:#000;
}
.result-win{background:var(--win);}
.result-lose{background:var(--lose);}
.result-draw{background:var(--draw);}
footer{
  margin-top:30px;
  text-align:center;
  font-size:13px;
  color:var(--gold);
  font-weight:700;
  opacity:.8;
}
footer a{color:var(--neon); text-decoration:none; font-weight:700;}
</style>
</head>

<body>
<div class="container" id="app">

<header>
  <img src="logo.png" alt="Logo">
  <h1 id="username">Player</h1>
  <div class="rank-badge" id="rankBadge">Rank #--</div>
</header>

<div class="card">
  <div class="row"><div class="label">Game ID</div><div class="value" id="gameId">—</div></div>
  <div class="row"><div class="label">Device</div><div class="value" id="device">—</div></div>
  <div class="row"><div class="label">Facebook</div><div class="value"><a id="facebook" target="_blank"></a></div></div>

  <div class="stats">
    <div class="stat-box"><div class="stat-title">Rating</div><div class="stat-value" id="rating">0</div></div>
    <div class="stat-box"><div class="stat-title">Wins</div><div class="stat-value" id="wins">0</div></div>
    <div class="stat-box"><div class="stat-title">Losses</div><div class="stat-value" id="losses">0</div></div>
    <div class="stat-box"><div class="stat-title">Draws</div><div class="stat-value" id="draws">0</div></div>
    <div class="stat-box"><div class="stat-title">Win Rate</div><div class="stat-value" id="winrate">0%</div></div>
  </div>
</div>

<div class="chart-container">
  <canvas id="ratingChart" height="200"></canvas>
</div>

<div class="card">
  <h3 style="color:var(--gold);margin-bottom:12px;">Recent Matches</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Opponent</th>
        <th>Result</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="matchesBody">
      <tr><td colspan="4">Loading...</td></tr>
    </tbody>
  </table>
</div>

<footer>
  Design by <a href="#">SI Shohan</a> | © 2026 AFNS Elite Strikers
</footer>

</div>

<script>
// Firebase Init
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});
const db=firebase.firestore();

// Player ID
const params=new URLSearchParams(location.search);
const playerId=params.get("id");
if(!playerId){
  document.getElementById("app").innerHTML="<h2 style='text-align:center'>Invalid Profile</h2>";
  throw new Error("ID Missing");
}

/* --- PLAYER INFO --- */
db.collection("players").doc(playerId).onSnapshot(doc=>{
  if(!doc.exists){
    document.getElementById("app").innerHTML="<h2 style='text-align:center'>Profile Not Found</h2>";
    return;
  }
  const d=doc.data();
  document.getElementById("username").innerText=d.username||"Player";
  document.getElementById("gameId").innerText=d.gameId||"—";
  document.getElementById("device").innerText=d.device||"—";
  document.getElementById("rating").innerText=d.rating||1000;

  const wins=d.wins||0, losses=d.losses||0, draws=d.draws||0;
  document.getElementById("wins").innerText=wins;
  document.getElementById("losses").innerText=losses;
  document.getElementById("draws").innerText=draws;
  const total=wins+losses+draws;
  document.getElementById("winrate").innerText=total>0?((wins/total)*100).toFixed(1)+"%":"0%";

  if(d.facebook && d.facebook.startsWith("http")){
    const fb=document.getElementById("facebook");
    fb.href=d.facebook; fb.innerText="View Facebook Profile";
  } else {
    document.getElementById("facebook").innerText="—";
  }
});

/* --- RANK --- */
db.collection("players").orderBy("rating","desc").get().then(snapshot=>{
  let rank=1;
  snapshot.forEach(doc=>{
    if(doc.id===playerId){
      document.getElementById("rankBadge").innerText="Rank #"+rank;
    }
    rank++;
  });
});

/* --- RECENT MATCHES WITH BADGES --- */
db.collection("matches")
.where("status","==","approved")
.orderBy("createdAt","desc")
.limit(10)
.onSnapshot(snapshot=>{
  const tbody=document.getElementById("matchesBody");
  tbody.innerHTML="";
  snapshot.forEach(doc=>{
    const m=doc.data();
    let opponent="", result="", badgeClass="";
    if(m.player1Id===playerId){opponent=m.player2; result=(m.winner===playerId)?"Win":(m.winner===null?"Draw":"Lose");}
    else if(m.player2Id===playerId){opponent=m.player1; result=(m.winner===playerId)?"Win":(m.winner===null?"Draw":"Lose");}
    else return;

    badgeClass=result==="Win"?"result-win":result==="Lose"?"result-lose":"result-draw";
    const date=m.createdAt ? m.createdAt.toDate().toLocaleDateString() : "-";

    tbody.innerHTML+=`<tr>
      <td>${date}</td>
      <td>${opponent}</td>
      <td><span class="result-badge ${badgeClass}">${result}</span></td>
      <td>${m.score}</td>
    </tr>`;
  });
  if(tbody.innerHTML==="") tbody.innerHTML="<tr><td colspan='4'>No recent matches</td></tr>";
});

/* --- RATING CHART --- */
const ctx=document.getElementById("ratingChart").getContext("2d");
const ratingChart=new Chart(ctx,{
  type:'line',
  data:{labels:[],datasets:[{label:'Rating',data:[],borderColor:'#FFD700',backgroundColor:'rgba(255,215,0,0.2)',tension:0.4,fill:true}]},
  options:{
    responsive:true,
    plugins:{tooltip:{mode:'index',intersect:false}},
    animation:{duration:1000,easing:'easeOutQuart'},
    scales:{y:{beginAtZero:false}}
  }
});

db.collection("ratingHistory")
.where("playerId","==",playerId)
.orderBy("timestamp","asc")
.onSnapshot(snapshot=>{
  const labels=[]; const data=[];
  snapshot.forEach(doc=>{
    const r=doc.data();
    const ts=r.timestamp;
    const date=ts.seconds ? new Date(ts.seconds*1000).toLocaleDateString() : new Date(ts).toLocaleDateString();
    labels.push(date);
    data.push(r.rating);
  });
  ratingChart.data.labels=labels;
  ratingChart.data.datasets[0].data=data;
  ratingChart.update();
});
</script>
</body>
</html>
