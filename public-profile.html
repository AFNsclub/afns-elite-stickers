<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>AFNS Elite Strikers | Player Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --gold:#FFD700;
  --neon:#00f7ff;
  --bg1:#010814;
  --bg2:#021b33;
  --card:rgba(0,0,0,.65);
  --win:#4cff8f;
  --lose:#ff4c4c;
  --draw:#ffd166;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
  min-height:100vh;
  background:radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px;
}
.container{
  max-width:600px;
  width:100%;
  background:var(--card);
  border-radius:20px;
  padding:25px 30px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 40px rgba(0,247,255,.35),0 0 20px rgba(255,215,0,.25);
}
header{text-align:center;margin-bottom:20px;}
header img{width:100px;}
h1{margin:10px 0;color:var(--gold);}
.rank-badge{
  display:inline-block;
  margin-top:10px;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(27,20,0,.7);
  color:var(--gold);
  font-weight:700;
}
.card{margin-top:20px;background:rgba(255,255,255,.05);padding:20px;border-radius:20px;}
.row{margin-bottom:14px;}
.label{font-size:12px;color:#aaa;}
.value{font-size:15px;font-weight:700;}
.stats{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.stat-box{
  background:rgba(0,0,0,.4);
  padding:12px;
  border-radius:14px;
  text-align:center;
}
.stat-title{font-size:12px;color:#aaa;}
.stat-value{font-size:18px;font-weight:700;margin-top:4px;}
.chart-container{
  margin-top:30px;
  background:rgba(0,0,0,.3);
  padding:15px;
  border-radius:20px;
}
select{
  padding:6px 10px;
  border-radius:10px;
  background:#000;
  color:#FFD700;
  border:1px solid #FFD700;
}
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.2);
}
th{color:var(--gold);}
.result-badge{
  padding:4px 10px;
  border-radius:12px;
  font-weight:700;
  color:#000;
}
.result-win{background:var(--win);}
.result-lose{background:var(--lose);}
.result-draw{background:var(--draw);}
footer{
  margin-top:30px;
  text-align:center;
  font-size:13px;
  color:var(--gold);
}
</style>
</head>

<body>
<div class="container" id="app">

<header>
  <img src="logo.png" alt="Logo">
  <h1 id="username">Player</h1>
  <div class="rank-badge" id="rankBadge">Rank #--</div>
</header>

<div class="card">
  <div class="row"><div class="label">Game ID</div><div class="value" id="gameId">—</div></div>
  <div class="row"><div class="label">Device</div><div class="value" id="device">—</div></div>
  <div class="row"><div class="label">Facebook</div><div class="value"><a id="facebook" target="_blank"></a></div></div>

  <div class="stats">
    <div class="stat-box"><div class="stat-title">Rating</div><div class="stat-value" id="rating">0</div></div>
    <div class="stat-box"><div class="stat-title">Wins</div><div class="stat-value" id="wins">0</div></div>
    <div class="stat-box"><div class="stat-title">Losses</div><div class="stat-value" id="losses">0</div></div>
    <div class="stat-box"><div class="stat-title">Draws</div><div class="stat-value" id="draws">0</div></div>
    <div class="stat-box"><div class="stat-title">Win Rate</div><div class="stat-value" id="winrate">0%</div></div>
  </div>
</div>

<div class="chart-container">
  <div style="text-align:right;margin-bottom:10px;">
    <select id="seasonFilter">
      <option value="all">All Seasons</option>
    </select>
  </div>
  <canvas id="ratingChart" height="200"></canvas>
</div>

<div class="card">
  <h3 style="color:var(--gold);margin-bottom:12px;">Recent Matches</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Opponent</th>
        <th>Result</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="matchesBody">
      <tr><td colspan="4">Loading...</td></tr>
    </tbody>
  </table>
</div>

<footer>
  © 2026 AFNS Elite Strikers
</footer>

</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBtDxu0LJyb10ZkhH8IpxT5s8PcKc4nUxM",
  authDomain:"afnsclub.firebaseapp.com",
  projectId:"afnsclub"
});
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const playerId = params.get("id");
if(!playerId){
  document.getElementById("app").innerHTML="<h2 style='text-align:center'>Invalid Profile</h2>";
  throw new Error("Missing ID");
}

/* PLAYER INFO + RANK */
db.collection("players").onSnapshot(snapshot=>{
  let players=[];
  snapshot.forEach(doc=>{
    players.push({id:doc.id,rating:doc.data().ratingAllTime||1000});
  });
  players.sort((a,b)=>b.rating-a.rating);
  const rankIndex=players.findIndex(p=>p.id===playerId);
  if(rankIndex!==-1){
    document.getElementById("rankBadge").innerText="Rank #"+(rankIndex+1);
  }
});

db.collection("players").doc(playerId).onSnapshot(doc=>{
  if(!doc.exists){
    document.getElementById("app").innerHTML="<h2 style='text-align:center'>Profile Not Found</h2>";
    return;
  }
  const d=doc.data();
  document.getElementById("username").innerText=d.username||"Player";
  document.getElementById("gameId").innerText=d.gameId||"—";
  document.getElementById("device").innerText=d.deviceName||"—";
  document.getElementById("rating").innerText=d.ratingAllTime||1000;
  document.getElementById("wins").innerText=d.wins||0;
  document.getElementById("losses").innerText=d.losses||0;
  document.getElementById("draws").innerText=d.draws||0;
});

/* RECENT MATCHES + CHART */
const seasonFilter=document.getElementById("seasonFilter");
let allMatches=[];

const ctx=document.getElementById("ratingChart").getContext("2d");
const ratingChart=new Chart(ctx,{
  type:'line',
  data:{labels:[],datasets:[{data:[],borderWidth:3,tension:.4,fill:false}]},
  options:{
    responsive:true,
    animation:{duration:1200},
    plugins:{
      legend:{display:false},
      tooltip:{
        callbacks:{
          label:function(context){
            const raw=context.raw;
            const sign=raw.change>0?"+":"";
            return "Rating: "+raw.rating+" ("+sign+raw.change+")";
          }
        }
      }
    },
    scales:{y:{beginAtZero:false}}
  }
});

function updateSeasonOptions(){
  const seasons=new Set();
  allMatches.forEach(m=>{if(m.seasonId)seasons.add(m.seasonId);});
  seasons.forEach(s=>{
    if(!document.querySelector(`option[value="${s}"]`)){
      const opt=document.createElement("option");
      opt.value=s;
      opt.innerText=s;
      seasonFilter.appendChild(opt);
    }
  });
}

function updateChart(){
  const selected=seasonFilter.value;
  const labels=[];
  const data=[];
  allMatches.forEach(m=>{
    if(selected!=="all"&&m.seasonId!==selected)return;
    if(m.player1Id!==playerId&&m.player2Id!==playerId)return;

    let after,before;
    if(m.player1Id===playerId){
      after=m.ratingAfter1;
      before=m.ratingBefore1;
    }else{
      after=m.ratingAfter2;
      before=m.ratingBefore2;
    }
    if(!after||!before)return;
    const change=after-before;
    labels.push(m.createdAt.toDate().toLocaleDateString());
    data.push({rating:after,change:change});
  });

  ratingChart.data.labels=labels;
  ratingChart.data.datasets[0].data=data;

  if(data.length){
    const last=data[data.length-1];
    ratingChart.data.datasets[0].borderColor=
      last.change>0?"#4cff8f":
      last.change<0?"#ff4c4c":"#ffd166";
  }

  ratingChart.update();
}

db.collection("matches")
.where("status","==","approved")
.orderBy("createdAt","asc")
.onSnapshot(snapshot=>{
  allMatches=[];
  snapshot.forEach(doc=>allMatches.push(doc.data()));
  updateSeasonOptions();
  updateChart();

  const tbody=document.getElementById("matchesBody");
  tbody.innerHTML="";
  let count=0;

  allMatches.slice().reverse().forEach(m=>{
    if(m.player1Id!==playerId&&m.player2Id!==playerId)return;
    if(count>=20)return;
    count++;

    let opponent,result,badgeClass;
    if(m.player1Id===playerId){
      opponent=m.player2;
      result=(m.winner===playerId)?"Win":
             (m.winner===null)?"Draw":"Lose";
    }else{
      opponent=m.player1;
      result=(m.winner===playerId)?"Win":
             (m.winner===null)?"Draw":"Lose";
    }
    badgeClass=result==="Win"?"result-win":
               result==="Lose"?"result-lose":"result-draw";

    const date=m.createdAt.toDate().toLocaleDateString();

    tbody.innerHTML+=`
      <tr>
        <td>${date}</td>
        <td>${opponent||"-"}</td>
        <td><span class="result-badge ${badgeClass}">${result}</span></td>
        <td>${m.score||"-"}</td>
      </tr>`;
  });

  if(count===0){
    tbody.innerHTML="<tr><td colspan='4'>No recent matches</td></tr>";
  }
});

seasonFilter.addEventListener("change",updateChart);
</script>
</body>
</html>
